function buildDefault(services){const tables={};services.forEach(s=>{tables[s.id]={};SALLE.forEach(tn=>{tables[s.id][tn]=dc(DEF_SALLE[tn]);});TERRASSE.forEach(tn=>{tables[s.id][tn]=dc(DEF_TERRASSE[tn]);});});return tables;}
function buildEmptyCompo(){return{rangs:[],zones:{Accueil:{active:true,memberIds:[]},Meuble:{active:false,memberIds:[]},Tournant:{active:false,memberIds:[]},Passe:{active:false,memberIds:[]},Out:{active:false,memberIds:[]}},extraZones:[]};}
function defaultPlateau(c){if(c<=2)return 100;if(c<=4)return 120;if(c<=6)return 140;if(c<=8)return 180;return 200;}
function suggestPlateau(tn,c,svcData){if(tn==='AQUA')return 120;if(c<=0)return null;if(tn==='4'){const t3B=svcData&&svcData['3B'];if(t3B&&t3B.covers>0)return 100;return c<=4?120:defaultPlateau(c);}if(tn==='6'){const t7B=svcData&&svcData['7B'];const t7=svcData&&svcData['7'];if(t7B&&t7B.covers>4&&t7&&t7.covers>0&&!t7.isConsole)return 100;}const T120=['AS','3','5','6','7B','15','17','19'];if(T120.includes(tn)&&c<=4)return 120;return defaultPlateau(c);}
function piedFromPlateau(pl){return pl<=140?'petit':'gros';}
function getCavallino(tn,c){if(tn==='AQUA')return 0;if(c<=0)return 0;if(c<=2)return 1;if(c<=4)return 2;if(c<=6)return 3;if(c<=8)return 4;if(c<=10)return 5;return 6;}
function nappesForCount(n){if(n<=0)return 0;if(n>6)n=6;return NAPPE_COUNT[n];}
function countNappes(svcData){const cnt={140:0,180:0,200:0};[...SALLE,...TERRASSE].forEach(tn=>{const d=svcData[tn];if(d&&d.covers>0&&d.plateau&&NAPPE_MAP[d.plateau])cnt[d.plateau]++;});return{n220:nappesForCount(cnt[140]),n260:nappesForCount(cnt[180]),n280:nappesForCount(cnt[200])};}

function computeTransfers(upList,dnList){const upQ=upList.map(x=>({...x})),dnQ=dnList.map(x=>({...x})),transfers=[];const isSl=tn=>SALLE.includes(tn),isTr=tn=>TERRASSE.includes(tn);const sz=(a,b)=>(isSl(a)&&isSl(b))||(isTr(a)&&isTr(b));for(let pass=0;pass<2;pass++){for(let i=0;i<upQ.length;i++){if(!upQ[i].n)continue;for(let j=0;j<dnQ.length;j++){if(!dnQ[j].n)continue;if(pass===0&&!sz(upQ[i].tn,dnQ[j].tn))continue;const give=Math.min(upQ[i].n,dnQ[j].n);if(give>0)transfers.push({from:dnQ[j].tn,to:upQ[i].tn,n:give});upQ[i].n-=give;dnQ[j].n-=give;if(!upQ[i].n)break;}}}return{transfers,netUp:upQ.filter(x=>x.n>0),netDn:dnQ.filter(x=>x.n>0)};}

function match1to1(neededList,releasedList,matchKey){const nedQ=neededList.map(x=>({...x,used:false})),relQ=releasedList.map(x=>({...x,used:false}));const transfers=[],usedTo={},usedFrom={};const isSl=tn=>SALLE.includes(tn),isTr=tn=>TERRASSE.includes(tn);const sz=(a,b)=>(isSl(a)&&isSl(b))||(isTr(a)&&isTr(b));for(let pass=0;pass<2;pass++){for(let i=0;i<nedQ.length;i++){const ned=nedQ[i];if(ned.used)continue;for(let j=0;j<relQ.length;j++){const rel=relQ[j];if(rel.used)continue;if(rel[matchKey]!==ned[matchKey])continue;if(rel.tn===ned.tn)continue;if(pass===0&&!sz(rel.tn,ned.tn))continue;if(usedTo[ned.tn]||usedFrom[rel.tn])continue;const item={fromTn:rel.tn,toTn:ned.tn,[matchKey]:rel[matchKey]};if(rel.pied!==undefined)item.pied=rel.pied;transfers.push(item);usedTo[ned.tn]=true;usedFrom[rel.tn]=true;rel.used=true;ned.used=true;break;}}}return{transfers,ascents:nedQ.filter(x=>!x.used),descents:relQ.filter(x=>!x.used)};}

function getSalleEmpireData(tables,depId,interId,arrId){
  const depSvc=tables[depId],interSvc=tables[interId],arrSvc=tables[arrId];
  if(!depSvc||!interSvc||!arrSvc)return null;
  const allT=[...SALLE,...TERRASSE];
  const plSwapS2R={},plSwapR2S={},piedSwapS2R={petit:0,gros:0},piedSwapR2S={petit:0,gros:0},tnsPlSwap=[];
  allT.forEach(tn=>{const iv=interSvc[tn],a=arrSvc[tn];const iA=!!(iv&&iv.covers>0),aA=!!(a&&a.covers>0);if(!iA||!aA)return;const iPl=iv.plateau,aPl=a.plateau;if(iPl===aPl)return;if(!tnsPlSwap.includes(tn))tnsPlSwap.push(tn);if(iPl)plSwapS2R[iPl]=(plSwapS2R[iPl]||0)+1;if(aPl)plSwapR2S[aPl]=(plSwapR2S[aPl]||0)+1;if(iPl&&aPl){const iPied=piedFromPlateau(iPl),aPied=piedFromPlateau(aPl);if(iPied!==aPied){piedSwapS2R[iPied]=(piedSwapS2R[iPied]||0)+1;piedSwapR2S[aPied]=(piedSwapR2S[aPied]||0)+1;}}});
  const plCount=(svc,excludeSwap)=>{const m={};allT.forEach(tn=>{const d=svc[tn];if(!d||d.covers<=0||!d.plateau)return;if(excludeSwap&&tnsPlSwap.includes(tn))return;m[d.plateau]=(m[d.plateau]||0)+1;});return m;};
  const piedCount=(svc,excludeSwap)=>{let petit=0,gros=0;allT.forEach(tn=>{const d=svc[tn];if(!d||d.covers<=0||!d.plateau)return;if(excludeSwap&&tnsPlSwap.includes(tn))return;if(piedFromPlateau(d.plateau)==='petit')petit++;else gros++;});return{petit,gros};};
  const fauteuilCount=svc=>{let n=0;allT.forEach(tn=>{const d=svc[tn];if(d&&d.covers>0&&!d.isConsole)n+=d.covers;});return n;};
  const cavallinoCount=svc=>{let n=0;allT.forEach(tn=>{const d=svc[tn];if(d&&d.covers>0&&!d.isConsole)n+=getCavallino(tn,d.covers);});return n;};
  const depPl=plCount(depSvc,false),interPl=plCount(interSvc,true),arrPl=plCount(arrSvc,true);
  const depPied=piedCount(depSvc,false),interPied=piedCount(interSvc,true),arrPied=piedCount(arrSvc,true);
  const depF=fauteuilCount(depSvc),interF=fauteuilCount(interSvc),arrF=fauteuilCount(arrSvc);
  const depC=cavallinoCount(depSvc),interC=cavallinoCount(interSvc),arrC=cavallinoCount(arrSvc);
  const mv=(D,M,J)=>({salleEmpire:Math.max(0,Math.min(D,J)-M),salleReserve:Math.max(0,D-M-J),reserveSalle:Math.max(0,M-D),reserveEmpire:Math.max(0,J-D)});
  const allPlSizes=[...new Set([...Object.keys(depPl),...Object.keys(interPl),...Object.keys(arrPl),...Object.keys(plSwapS2R),...Object.keys(plSwapR2S)].map(Number))].sort((a,b)=>a-b);
  const plMvt={};
  allPlSizes.forEach(pl=>{const r=mv(depPl[pl]||0,interPl[pl]||0,arrPl[pl]||0);r.salleReserve+=(plSwapS2R[pl]||0);r.reserveSalle+=(plSwapR2S[pl]||0);if(r.salleEmpire||r.salleReserve||r.reserveSalle||r.reserveEmpire)plMvt[pl]=r;});
  const piedMvt={};
  ['petit','gros'].forEach(p=>{const r=mv(depPied[p]||0,interPied[p]||0,arrPied[p]||0);r.salleReserve+=piedSwapS2R[p]||0;r.reserveSalle+=piedSwapR2S[p]||0;if(r.salleEmpire||r.salleReserve||r.reserveSalle||r.reserveEmpire)piedMvt[p]=r;});
  const fMvt=mv(depF,interF,arrF);
  const cMvt=mv(depC,interC,arrC);
  return{plMvt,piedMvt,fMvt,cMvt};
}

function getMvtData(tables,services,currentService){
  const idx=services.findIndex(s=>s.id===currentService);let prevId=null;
  if(currentService==='mar-d-next')prevId='sam-d';else if(idx>0)prevId=services[idx-1].id;
  if(!prevId)return null;
  const prevSvc=tables[prevId],currSvc=tables[currentService];if(!prevSvc||!currSvc)return null;
  const allT=[...SALLE,...TERRASSE];const cN=countNappes(currSvc);
  const plNeeded=[],plReleased=[],piedNeeded=[],piedReleased=[],fauteuilsUp=[],fauteuilsDn=[],cavallinoUp=[],cavallinoDn=[];
  allT.forEach(tn=>{const pd=prevSvc[tn]||null,cd=currSvc[tn]||null;const pAct=pd&&pd.covers>0,cAct=cd&&cd.covers>0;const pPl=pAct?pd.plateau:null,cPl=cAct?cd.plateau:null;const pCons=pAct&&pd.isConsole,cCons=cAct&&cd.isConsole;const pPied=pPl?piedFromPlateau(pPl):null,cPied=cPl?piedFromPlateau(cPl):null;if(pAct&&!cAct){if(pPl)plReleased.push({tn,pl:pPl,pied:pPied});piedReleased.push({tn,pied:pPied});}else if(!pAct&&cAct){if(cPl)plNeeded.push({tn,pl:cPl,pied:cPied});piedNeeded.push({tn,pied:cPied});}else if(pAct&&cAct){if(pPl!==cPl){if(pPl)plReleased.push({tn,pl:pPl,pied:pPied});if(cPl)plNeeded.push({tn,pl:cPl,pied:cPied});}if(pPied!==cPied){piedReleased.push({tn,pied:pPied});piedNeeded.push({tn,pied:cPied});}}if(pAct&&!cAct){if(!pCons){fauteuilsDn.push({tn,n:pd.covers});const cv=getCavallino(tn,pd.covers);if(cv>0)cavallinoDn.push({tn,n:cv});}}else if(!pAct&&cAct){if(!cCons){fauteuilsUp.push({tn,n:cd.covers});const cv=getCavallino(tn,cd.covers);if(cv>0)cavallinoUp.push({tn,n:cv});}}else if(pAct&&cAct){if(!pCons&&!cCons){const df=cd.covers-pd.covers;if(df>0)fauteuilsUp.push({tn,n:df});if(df<0)fauteuilsDn.push({tn,n:-df});}else if(pCons&&!cCons)fauteuilsUp.push({tn,n:cd.covers});else if(!pCons&&cCons)fauteuilsDn.push({tn,n:pd.covers});const pc=getCavallino(tn,pCons?0:pd.covers),cc=getCavallino(tn,cCons?0:cd.covers);if(cc>pc)cavallinoUp.push({tn,n:cc-pc});if(pc>cc)cavallinoDn.push({tn,n:pc-cc});}});
  const plR=match1to1(plNeeded,plReleased,'pl');const piR=match1to1(piedNeeded,piedReleased,'pied');const fTr=computeTransfers(fauteuilsUp,fauteuilsDn);const cTr=computeTransfers(cavallinoUp,cavallinoDn);
  // Batteries: only for the last service before mar-d-next
  // = number of active tables (covers>0) in mar-d-next, 1 battery per table regardless of pied or OFF
  let batteries=0;
  const marNextSvc=tables['mar-d-next'];
  const isLastBeforeNext=currentService==='sam-d'||(()=>{const idx2=services.findIndex(s=>s.id===currentService);const nextSvc=services[idx2+1];return nextSvc&&nextSvc.id==='mar-d-next';})();
  if(isLastBeforeNext&&marNextSvc){[...SALLE,...TERRASSE].forEach(tn=>{const d=marNextSvc[tn];if(d&&d.covers>0)batteries++;});}
  return{plAscents:plR.ascents,plDescents:plR.descents,plTransfers:plR.transfers,piedAscents:piR.ascents,piedDescents:piR.descents,piedTransfers:piR.transfers,fTr,cTr,upN220:cN.n220,upN260:cN.n260,upN280:cN.n280,batteries,prevLabel:services.find(s=>s.id===prevId)?.label??prevId};
}

function getLingeData(tables,services){
  const WK_IDS=['mar-d','mer-d','jeu-d','ven-dj','ven-d','sam-dj','sam-d'];const VENDSAM=['ven-dj','ven-d','sam-dj','sam-d'];
  const extraIds=services.filter(s=>s.extra).map(s=>s.id);const allIds=[...WK_IDS,...extraIds].filter(id=>services.some(s=>s.id===id));
  function countLN(sd){const cnt={180:0,200:0,220:0,260:0,280:0};[...SALLE,...TERRASSE].forEach(tn=>{const d=sd[tn];if(d&&d.covers>0&&d.plateau&&LINGE_NAPPE_MAP[d.plateau])cnt[LINGE_NAPPE_MAP[d.plateau]]++;});return cnt;}
  let wkF=0,vsF=0;const wkN={180:0,200:0,220:0,260:0,280:0},vsN={180:0,200:0,220:0,260:0,280:0};
  allIds.forEach(id=>{const sd=tables[id];if(!sd)return;let f=0;[...SALLE,...TERRASSE].forEach(tn=>{const d=sd[tn];if(d&&d.covers>0&&!d.isConsole)f+=d.covers;});const cn=countLN(sd);wkF+=f;[180,200,220,260,280].forEach(k=>{wkN[k]+=cn[k];});const isVS=VENDSAM.includes(id)||services.some(s=>s.id===id&&s.extra);if(isVS){vsF+=f;[180,200,220,260,280].forEach(k=>{vsN[k]+=cn[k];});}});
  return{wkF,vsF,wkN,vsN};
}

function sortMembers(members){return[...members].sort((a,b)=>{const ra=ROLE_ORDER.indexOf(a.role),rb=ROLE_ORDER.indexOf(b.role);if(ra!==rb)return(ra===-1?99:ra)-(rb===-1?99:rb);if(a.id==='victoria')return -1;if(b.id==='victoria')return 1;return a.name.localeCompare(b.name);});}

function TnLabel({tn}){const label=tn==='AQUA'?"l'Aqua":tn==='AS'?"l'AS":'la '+tn;return <span style={{fontWeight:700,textDecoration:'underline',color:'#1a1a1a'}}>{label}</span>;}
function Bold({children}){return <span style={{fontWeight:700,color:'#1a1a1a'}}>{children}</span>;}
function Line({children}){return <div style={{lineHeight:1.6,fontSize:12,color:'#1a1a1a'}}>{children}</div>;}
function Section({label,bg,color,children}){return <div style={{marginBottom:6}}><div style={{display:'inline-block',background:bg,color,fontSize:10,padding:'2px 8px',borderRadius:4,fontWeight:700,marginBottom:3,letterSpacing:'.04em'}}>{label}</div><div style={{display:'flex',flexDirection:'column',gap:2,paddingLeft:4}}>{children}</div></div>;}
function TotCard({label,bg,children}){return <div style={{background:bg,borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden'}}><div style={{fontSize:10,fontWeight:500,color:'#888',padding:'8px 6px 4px',width:'100%',textAlign:'center'}}>{label}</div>{children}</div>;}
function RoleBadge({role}){const colors={"Maître d'Hôtel":{bg:'#ede9fe',color:'#5b21b6'},'Chef de rang':{bg:'#dbeafe',color:'#1e40af'},'Cheffe de rang':{bg:'#dbeafe',color:'#1e40af'},'Commis de rang':{bg:'#f0fdf4',color:'#166534'},'Chargée de clientèle':{bg:'#fef3c7',color:'#92400e'},'Chargé de clientèle':{bg:'#fef3c7',color:'#92400e'}};const c=colors[role]||{bg:'#f5f4f0',color:'#555'};return <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:c.bg,color:c.color,fontWeight:600}}>{role}</span>;}

function EmpireFluxBloc({title,bg,bc,rows}){if(!rows.length)return null;return(<div style={{background:bg,borderRadius:8,padding:10,border:'0.5px solid '+bc}}><div style={{fontSize:10,fontWeight:700,color:bc,marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>{title}</div>{rows.map((r,i)=><div key={i} style={{fontSize:12,color:'#1a1a1a',lineHeight:1.7}}>{r}</div>)}</div>);}
function EmpireRecapBloc({title,bc,rows}){if(!rows.length)return null;return(<div style={{background:'#f0f9ff',borderRadius:8,padding:10,border:'1px solid '+bc,marginTop:2}}><div style={{fontSize:10,fontWeight:700,color:bc,marginBottom:6,textTransform:'uppercase',letterSpacing:'.04em'}}>{title}</div>{rows.map((r,i)=><div key={i} style={{fontSize:12,color:'#1a1a1a',lineHeight:1.7}}>{r}</div>)}</div>);}

function buildFluxRows(fluxKey,plMvt,piedMvt,fMvt,cMvt){
  const rows=[];
  ['petit','gros'].forEach(p=>{const m=piedMvt[p];if(m&&m[fluxKey]>0){const n=m[fluxKey];rows.push(`${n} ${p}${n>1?'s':''} pied${n>1?'s':''}`);}});
  [100,120,140,180,200].forEach(pl=>{const m=plMvt[pl];if(m&&m[fluxKey]>0){const n=m[fluxKey];rows.push(`${n} plateau${n>1?'x':''} ${PL}${pl}`);}});
  if(fMvt&&fMvt[fluxKey]>0){const n=fMvt[fluxKey];rows.push(`${n} fauteuil${n>1?'s':''}`);}
  if(cMvt&&cMvt[fluxKey]>0){const n=cMvt[fluxKey];rows.push(`${n} cavallino`);}
  return rows;
}

function SalleEmpireBlock({tables,services,currentService}){

  const data=(on&&inter&&arr)?getSalleEmpireData(tables,currentService,inter,arr):null;
  const arrLabel=services.find(s=>s.id===arr)?.label??'';const interLabel=services.find(s=>s.id===inter)?.label??'';
  return(
    <div style={{border:'0.5px solid '+(on?'#f59e0b':'#d4d2c8'),borderRadius:12,padding:12,background:on?'#fffbeb':'#fff'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:on?10:0}}>
        <div style={{fontSize:13,fontWeight:500,flex:1}}>Salle Empire</div>
        <button onClick={()=>setOn(!on)} style={{fontSize:11,padding:'3px 12px',borderRadius:10,border:'none',cursor:'pointer',background:on?'#f59e0b':'#e5e7eb',color:on?'#fff':'#555',fontWeight:600}}>{on?'ON':'OFF'}</button>
      </div>
      {on&&(<div style={{display:'flex',flexDirection:'column',gap:8}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div><div style={{fontSize:10,color:'#888',marginBottom:3}}>Service intermédiaire</div>
            <select value={inter} onChange={e=>setInter(e.target.value)} style={{width:'100%',fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid #ccc',background:'#fff'}}>
              <option value="">-- choisir --</option>
              {services.filter(s=>s.id!==currentService&&s.id!==arr).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select></div>
          <div><div style={{fontSize:10,color:'#888',marginBottom:3}}>Service d'arrivée</div>
            <select value={arr} onChange={e=>setArr(e.target.value)} style={{width:'100%',fontSize:12,padding:'5px 8px',borderRadius:6,border:'0.5px solid #ccc',background:'#fff'}}>
              <option value="">-- choisir --</option>
              {services.filter(s=>s.id!==currentService&&s.id!==inter).map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select></div>
        </div>
        {(!inter||!arr)&&<div style={{fontSize:12,color:'#aaa',fontStyle:'italic'}}>Choisissez les deux services.</div>}
        {data&&(()=>{
          const{plMvt,piedMvt,fMvt,cMvt}=data;
          const rowsS2E=buildFluxRows('salleEmpire',plMvt,piedMvt,fMvt,cMvt);
          const rowsS2R=buildFluxRows('salleReserve',plMvt,piedMvt,fMvt,cMvt);
          const rowsR2S=buildFluxRows('reserveSalle',plMvt,piedMvt,fMvt,cMvt);
          const rowsR2E=buildFluxRows('reserveEmpire',plMvt,piedMvt,fMvt,cMvt);
          const recapRows=[];
          ['petit','gros'].forEach(p=>{const se=(piedMvt[p]?.salleEmpire||0)+(piedMvt[p]?.reserveEmpire||0);if(se>0)recapRows.push(`${se} ${p}${se>1?'s':''} pied${se>1?'s':''}`)});
          [100,120,140,180,200].forEach(pl=>{const se=(plMvt[pl]?.salleEmpire||0)+(plMvt[pl]?.reserveEmpire||0);if(se>0)recapRows.push(`${se} plateau${se>1?'x':''} ${PL}${pl}`)});
          const fTot=(fMvt.salleEmpire||0)+(fMvt.reserveEmpire||0);if(fTot>0)recapRows.push(`${fTot} fauteuil${fTot>1?'s':''}`);
          const cTot=(cMvt.salleEmpire||0)+(cMvt.reserveEmpire||0);if(cTot>0)recapRows.push(`${cTot} cavallino`);
          return(<div style={{display:'flex',flexDirection:'column',gap:6}}>

function ZoneBlock({title,tables,svcData,onOpen,zone}){

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(72px,1fr))',gap:6}}>
      {tables.map(tn=>{const d=svcData[tn]||mkoff(),active=d.covers>0,aqua=tn==='AQUA',isCons=!!d.isConsole;
        let border='1.5px solid #d4d2c8',bg='#f5f4f0',nc='#1a1a1a',sc='#888';
        if(active){
          if(aqua){border='1.5px solid #1D9E75';bg='#d1fae5';nc='#065f46';sc='#047857';}
          else if(isCons){border='1.5px solid #d97706';bg='#fef3c7';nc='#92400e';sc='#b45309';}
          else{const pc=PLATEAU_COLORS[d.plateau]||PLATEAU_COLORS[120];bg=pc.bg;border='1.5px solid '+pc.border;nc=pc.nc;sc=pc.ic;}
        }
        const detail=active?(isCons?'console '+PL+d.plateau:piedFromPlateau(d.plateau)+' '+PL+d.plateau):null;

}

function MvtBlock({plAscents,plDescents,plTransfers,piedAscents,piedDescents,piedTransfers,fTr,cTr,upN220,upN260,upN280,batteries}){
  if(!plAscents)return <span style={{fontSize:12,color:'#888',fontStyle:'italic'}}>Premier service : référence de départ.</span>;
  const pa=plAscents||[],pd2=plDescents||[],pt=plTransfers||[];
  const pa2=piedAscents||[],pd3=piedDescents||[],pt2=piedTransfers||[];
  const n220=upN220||0,n260=upN260||0,n280=upN280||0,bat=batteries||0;
  const hasAny=pa.length||pd2.length||pt.length||pa2.length||pd3.length||pt2.length||(fTr&&(fTr.netUp.length||fTr.netDn.length||fTr.transfers.length))||(cTr&&(cTr.netUp.length||cTr.netDn.length||cTr.transfers.length))||n220||n260||n280||bat;
  if(!hasAny)return <span style={{fontSize:12,color:'#888',fontStyle:'italic'}}>Aucun mouvement.</span>;
  const joinTns=tns=>tns.map((t,i)=><span key={t}>{i===0?null:(i===tns.length-1?' et ':',  ')}<TnLabel tn={t}/></span>);
  const tblList=arr=>{if(!arr||!arr.length)return null;const items=arr.map((x,i)=><span key={x.tn}>{i>0?', ':''}<TnLabel tn={x.tn}/>{' x'}<Bold>{x.n}</Bold></span>);return <span style={{color:'#666'}}>{' ('}{items}{')'}</span>;};
  const chunked=(arr,size)=>{const r=[];for(let i=0;i<arr.length;i+=size)r.push(arr.slice(i,i+size));return r;};
  const groupByPl=list=>{const m={};list.forEach(x=>{if(!m[x.pl])m[x.pl]={pl:x.pl,tns:[]};m[x.pl].tns.push(x.tn);});return[100,120,140,180,200].map(pl=>m[pl]).filter(Boolean);};
  const groupByPied=list=>{const m={};list.forEach(x=>{if(!m[x.pied])m[x.pied]={pied:x.pied,tns:[]};m[x.pied].tns.push(x.tn);});return['petit','gros'].map(p=>m[p]).filter(Boolean);};
  const upRows=[];
  groupByPied(pa2).forEach(g=>{const n=g.tns.length;upRows.push(<Line key={'pup_'+g.pied}><Bold>{n===1?'un '+g.pied+' pied':n+' '+g.pied+'s pieds'}</Bold>{' pour '}{joinTns(g.tns)}</Line>);});
  groupByPl(pa).forEach(g=>{const n=g.tns.length;upRows.push(<Line key={'plasc_'+g.pl}><Bold>{n===1?'un plateau '+PL+g.pl:n+' plateaux '+PL+g.pl}</Bold>{' pour '}{joinTns(g.tns)}</Line>);});
  if(fTr&&fTr.netUp.length>0){const fu=fTr.netUp.reduce((s,x)=>s+x.n,0);upRows.push(<Line key="fup"><Bold>{fu}</Bold>{' fauteuil'+(fu>1?'s':'')}{tblList(fTr.netUp)}</Line>);}
  if(cTr&&cTr.netUp.length>0){const cu=cTr.netUp.reduce((s,x)=>s+x.n,0);upRows.push(<Line key="cup"><Bold>{cu}</Bold>{' cavallino'}{tblList(cTr.netUp)}</Line>);}
  if(n220>0)upRows.push(<Line key="n220"><Bold>{n220}</Bold>{' nappe'+(n220>1?'s':'')+' '+PL+'220'}</Line>);
  if(n260>0)upRows.push(<Line key="n260"><Bold>{n260}</Bold>{' nappe'+(n260>1?'s':'')+' '+PL+'260'}</Line>);
  if(n280>0)upRows.push(<Line key="n280"><Bold>{n280}</Bold>{' nappe'+(n280>1?'s':'')+' '+PL+'280'}</Line>);
  if(bat>0)upRows.push(<Line key="bat"><Bold>{bat}</Bold>{' batterie'+(bat>1?'s':'')+' (Mardi suivant)'}</Line>);
  const dnRows=[];
  groupByPied(pd3).forEach(g=>{const n=g.tns.length;dnRows.push(<Line key={'pdn_'+g.pied}><Bold>{n===1?'le '+g.pied+' pied':'les '+g.pied+'s pieds'}</Bold>{' de '}{joinTns(g.tns)}</Line>);});
  groupByPl(pd2).forEach(g=>{const n=g.tns.length;dnRows.push(<Line key={'pldsc_'+g.pl}><Bold>{n===1?'le plateau '+PL+g.pl:'les plateaux '+PL+g.pl}</Bold>{' de '}{joinTns(g.tns)}</Line>);});
  if(fTr&&fTr.netDn.length>0){const fd=fTr.netDn.reduce((s,x)=>s+x.n,0);dnRows.push(<Line key="fdn"><Bold>{fd}</Bold>{' fauteuil'+(fd>1?'s':'')}{tblList(fTr.netDn)}</Line>);}
  if(cTr&&cTr.netDn.length>0){const cd2=cTr.netDn.reduce((s,x)=>s+x.n,0);dnRows.push(<Line key="cdn"><Bold>{cd2}</Bold>{' cavallino'}{tblList(cTr.netDn)}</Line>);}
  const trPlRows=[];chunked(pt,2).forEach((chunk,ci)=>{const nodes=chunk.map((t,i)=><span key={i}>{i>0&&<span style={{color:'#aaa'}}> · </span>}{'le plateau '}<Bold>{PL+t.pl}</Bold>{' de '}<TnLabel tn={t.fromTn}/>{' à '}<TnLabel tn={t.toTn}/></span>);trPlRows.push(<Line key={'trpl'+ci}>{nodes}</Line>);});
  const trPiedRows=[];chunked(pt2,2).forEach((chunk,ci)=>{const nodes=chunk.map((t,i)=><span key={i}>{i>0&&<span style={{color:'#aaa'}}> · </span>}{'le '}<Bold>{t.pied+' pied'}</Bold>{' de '}<TnLabel tn={t.fromTn}/>{' à '}<TnLabel tn={t.toTn}/></span>);trPiedRows.push(<Line key={'trpied'+ci}>{nodes}</Line>);});
  const fTrRows=chunked(fTr?fTr.transfers:[],2).map((chunk,ci)=>{const nodes=chunk.map((t,i)=><span key={i}>{i>0&&<span style={{color:'#aaa'}}> · </span>}<Bold>{t.n}</Bold>{' de '}<TnLabel tn={t.from}/>{' à '}<TnLabel tn={t.to}/></span>);return <Line key={'ftr'+ci}>{nodes}</Line>;});
  const cTrRows=chunked(cTr?cTr.transfers:[],2).map((chunk,ci)=>{const nodes=chunk.map((t,i)=><span key={i}>{i>0&&<span style={{color:'#aaa'}}> · </span>}<Bold>{t.n}</Bold>{' cavallino de '}<TnLabel tn={t.from}/>{' à '}<TnLabel tn={t.to}/></span>);return <Line key={'ctr'+ci}>{nodes}</Line>;});
  return(<div style={{display:'flex',flexDirection:'column',gap:2}}>
    {upRows.length>0&&<Section label="↑ À monter" bg="#dcfce7" color="#166534">{upRows}</Section>}
    {dnRows.length>0&&<Section label="↓ À descendre" bg="#fee2e2" color="#991b1b">{dnRows}</Section>}
    {trPlRows.length>0&&<Section label="⇄ Transferts plateaux" bg="#fef3c7" color="#92400e">{trPlRows}</Section>}
    {trPiedRows.length>0&&<Section label="⇄ Transferts pieds" bg="#fef3c7" color="#92400e">{trPiedRows}</Section>}
    {fTrRows.length>0&&<Section label="⇄ Transferts fauteuils" bg="#fef3c7" color="#92400e">{fTrRows}</Section>}
    {cTrRows.length>0&&<Section label="⇄ Transferts cavallino" bg="#fef3c7" color="#92400e">{cTrRows}</Section>}
  </div>);
}

function CompoView({services,currentService,setCurrentService,tables,compos,setCompos,team,setTeam,save,allSvcState}){
  const svcData=tables[currentService]||{};const compo=compos[currentService]||buildEmptyCompo();const svcLabel=services.find(s=>s.id===currentService)?.label??'';
  const tableRangCount={};[...SALLE,...TERRASSE].forEach(tn=>{tableRangCount[tn]=0;});compo.rangs.forEach(r=>r.tableIds.forEach(tn=>{tableRangCount[tn]=(tableRangCount[tn]||0)+1;}));
  const [selectedRangId,setSelectedRangId]=useState(null);const [editingRangId,setEditingRangId]=useState(null);const [editingRangName,setEditingRangName]=useState('');const [editingZoneId,setEditingZoneId]=useState(null);const [editingZoneName,setEditingZoneName]=useState('');const [showTeamMgr,setShowTeamMgr]=useState(false);const [showExport,setShowExport]=useState(false);const [showInit,setShowInit]=useState(false);const [selectedZoneKey,setSelectedZoneKey]=useState(null);const [selectedZoneIsExtra,setSelectedZoneIsExtra]=useState(false);
  const assignedIds=new Set();compo.rangs.forEach(r=>r.memberIds.forEach(id=>assignedIds.add(id)));Object.values(compo.zones).forEach(z=>z.memberIds.forEach(id=>assignedIds.add(id)));compo.extraZones.forEach(z=>z.memberIds.forEach(id=>assignedIds.add(id)));
  function updateCompo(newCompo){const newCompos={...compos,[currentService]:newCompo};setCompos(newCompos);save(allSvcState.services,allSvcState.tables,allSvcState.terrasseMode,allSvcState.manual,currentService,newCompos,team);}
  function addRang(){const id='rang_'+Date.now();updateCompo({...compo,rangs:[...compo.rangs,{id,name:'Nouveau rang',tableIds:[],memberIds:[]}]});setSelectedRangId(id);setSelectedZoneKey(null);}
  function deleteRang(id){updateCompo({...compo,rangs:compo.rangs.filter(r=>r.id!==id)});if(selectedRangId===id)setSelectedRangId(null);}
  function moveRangUp(id){const rangs=[...compo.rangs];const i=rangs.findIndex(r=>r.id===id);if(i<=0)return;[rangs[i-1],rangs[i]]=[rangs[i],rangs[i-1]];updateCompo({...compo,rangs});}
  function moveRangDown(id){const rangs=[...compo.rangs];const i=rangs.findIndex(r=>r.id===id);if(i>=rangs.length-1)return;[rangs[i],rangs[i+1]]=[rangs[i+1],rangs[i]];updateCompo({...compo,rangs});}
  function toggleTableInRang(tn){if(!selectedRangId)return;const rang=compo.rangs.find(r=>r.id===selectedRangId);if(!rang)return;const inIt=rang.tableIds.includes(tn);const newIds=inIt?rang.tableIds.filter(t=>t!==tn):[...rang.tableIds,tn];const autoName=rang.name===rang.tableIds.join(' ')||rang.name==='Nouveau rang'||rang.name==='Rang';const newName=autoName?(newIds.join(' ')||'Rang'):rang.name;updateCompo({...compo,rangs:compo.rangs.map(r=>r.id===selectedRangId?{...r,tableIds:newIds,name:newName}:r)});}
  function toggleMemberInRang(memberId){if(!selectedRangId)return;const rang=compo.rangs.find(r=>r.id===selectedRangId);if(!rang)return;const has=rang.memberIds.includes(memberId);updateCompo({...compo,rangs:compo.rangs.map(r=>r.id===selectedRangId?{...r,memberIds:has?r.memberIds.filter(id=>id!==memberId):[...r.memberIds,memberId]}:r)});}

function CompoExport({onClose,compo,team,svcLabel,svcData}){
  const outerRef=useRef(null),contentRef=useRef(null);const [scale,setScale]=useState(1);
  useEffect(()=>{function fit(){if(!outerRef.current||!contentRef.current)return;contentRef.current.style.transform='scale(1)';const aH=outerRef.current.clientHeight-16,aW=outerRef.current.clientWidth-16,cH=contentRef.current.scrollHeight,cW=contentRef.current.scrollWidth;setScale(Math.min(1,aH/cH,aW/cW));}let id=requestAnimationFrame(()=>{id=requestAnimationFrame(fit);});window.addEventListener('resize',fit);return()=>{cancelAnimationFrame(id);window.removeEventListener('resize',fit);};},[]);

const JOURS_DEFAULT=[{id:'lun',label:'Lundi'},{id:'mar',label:'Mardi'},{id:'mer',label:'Mercredi'},{id:'jeu',label:'Jeudi'},{id:'ven',label:'Vendredi'},{id:'sam',label:'Samedi'},{id:'dim',label:'Dimanche'}];

function PlanningView({team,planning,setPlanning,saveAll}){
  const [editCell,setEditCell]=useState(null); // {memberId, dayId}
  const [editHeure,setEditHeure]=useState('');
  const [editNote,setEditNote]=useState('');
  const [editWeek,setEditWeek]=useState(false);
  const [weekDraft,setWeekDraft]=useState('');

  const days=planning.days||JOURS_DEFAULT;
  const entries=planning.entries||{};
  const sorted=sortMembers(team);

  function getEntry(memberId,dayId){return entries[memberId]?.[dayId]||null;}

  function openCell(memberId,dayId){
    const e=getEntry(memberId,dayId);
    setEditCell({memberId,dayId});
    setEditHeure(e?.heure||'');
    setEditNote(e?.note||'');
  }

  function saveCell(){
    if(!editCell)return;
    const{memberId,dayId}=editCell;
    const newEntries=dc(entries);
    if(!newEntries[memberId])newEntries[memberId]={};
    if(!editHeure&&!editNote){delete newEntries[memberId][dayId];}
    else{newEntries[memberId][dayId]={heure:editHeure.trim(),note:editNote.trim()};}
    const newPlanning={...planning,entries:newEntries};
    setPlanning(newPlanning);
    saveAll(newPlanning);
    setEditCell(null);
  }

  function clearCell(){
    if(!editCell)return;
    const{memberId,dayId}=editCell;
    const newEntries=dc(entries);
    if(newEntries[memberId])delete newEntries[memberId][dayId];
    const newPlanning={...planning,entries:newEntries};
    setPlanning(newPlanning);
    saveAll(newPlanning);
    setEditCell(null);
  }

  function saveWeekLabel(){
    const newPlanning={...planning,weekLabel:weekDraft};
    setPlanning(newPlanning);
    saveAll(newPlanning);
    setEditWeek(false);
  }

  const roleColors={"Maître d'Hôtel":{bg:'#ede9fe',color:'#5b21b6'},'Chef de rang':{bg:'#dbeafe',color:'#1e40af'},'Cheffe de rang':{bg:'#dbeafe',color:'#1e40af'},'Commis de rang':{bg:'#f0fdf4',color:'#166534'},'Chargée de clientèle':{bg:'#fef3c7',color:'#92400e'},'Chargé de clientèle':{bg:'#fef3c7',color:'#92400e'}};

  return(<div style={{display:'flex',flexDirection:'column',gap:10}}>
    {/* Header semaine */}
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'#ececea',borderRadius:8,border:'0.5px solid #d4d2c8'}}>
      <span style={{fontSize:13,color:'#666'}}>Semaine :</span>
      {editWeek?(<>
        <input autoFocus value={weekDraft} onChange={e=>setWeekDraft(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveWeekLabel();if(e.key==='Escape')setEditWeek(false);}} placeholder="ex: 30 juin – 06 juillet 2026" style={{flex:1,fontSize:13,padding:'4px 8px',border:'0.5px solid #378ADD',borderRadius:6,outline:'none'}}/>
        <button onClick={saveWeekLabel} style={{padding:'5px 12px',fontSize:12,border:'0.5px solid #378ADD',borderRadius:6,cursor:'pointer',background:'#dbeafe',color:'#1e40af'}}>OK</button>
        <button onClick={()=>setEditWeek(false)} style={{padding:'5px 10px',fontSize:12,border:'0.5px solid #ccc',borderRadius:6,cursor:'pointer',background:'#fff',color:'#888'}}>Annuler</button>
      </>):(<>
        <span onClick={()=>{setWeekDraft(planning.weekLabel||'');setEditWeek(true);}} style={{fontSize:13,fontWeight:500,color:planning.weekLabel?'#1a1a1a':'#aaa',cursor:'pointer',flex:1}}>{planning.weekLabel||'Cliquer pour saisir la semaine…'}</span>
        <button onClick={()=>{setWeekDraft(planning.weekLabel||'');setEditWeek(true);}} style={{padding:'5px 12px',fontSize:12,border:'0.5px solid #ccc',borderRadius:6,cursor:'pointer',background:'#fff',color:'#555'}}>Modifier</button>
      </>)}
    </div>

    {/* Grille */}
    <div style={{overflowX:'auto'}}>
      <table style={{borderCollapse:'collapse',width:'100%',minWidth:700}}>
        <thead>
          <tr>
            <th style={{width:110,padding:'6px 8px',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',color:'#888',background:'#f5f4f0',textAlign:'left',borderBottom:'1px solid #e5e7eb'}}>Personne</th>
            {days.map(d=>(<th key={d.id} style={{padding:'6px 4px',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.04em',color:'#888',background:'#f5f4f0',textAlign:'center',borderBottom:'1px solid #e5e7eb',minWidth:90}}>{d.label}</th>))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((m,mi)=>{
            const rc=roleColors[m.role]||{bg:'#f5f4f0',color:'#555'};
            return(<tr key={m.id} style={{background:mi%2===0?'#fff':'#fafaf9'}}>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid #f0efe9',verticalAlign:'middle'}}>
                <div style={{fontSize:12,fontWeight:600,color:'#1a1a1a'}}>{m.name}</div>
                <div style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:rc.bg,color:rc.color,fontWeight:600,display:'inline-block',marginTop:2}}>{m.role}</div>
              </td>
              {days.map(d=>{
                const e=getEntry(m.id,d.id);
                const isActive=!!(e?.heure||e?.note);
                return(<td key={d.id} onClick={()=>openCell(m.id,d.id)} style={{padding:'4px',borderBottom:'0.5px solid #f0efe9',textAlign:'center',cursor:'pointer',verticalAlign:'middle'}}>
                  <div style={{borderRadius:6,padding:'4px 3px',minHeight:36,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:isActive?'#eff6ff':'#f5f4f0',border:'0.5px solid '+(isActive?'#93c5fd':'#e5e7eb'),transition:'all .12s'}}>
                    {isActive?(<>
                      {e.heure&&<div style={{fontSize:11,fontWeight:700,color:'#1e40af',lineHeight:1.2}}>{e.heure}</div>}
                      {e.note&&<div style={{fontSize:9,color:'#3b82f6',lineHeight:1.2,marginTop:1,maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.note}</div>}
                    </>):<div style={{fontSize:10,color:'#ccc'}}>–</div>}
                  </div>
                </td>);
              })}
            </tr>);
          })}
        </tbody>
      </table>
    </div>

    {/* Modal saisie cellule */}
    {editCell&&(()=>{
      const m=team.find(x=>x.id===editCell.memberId);
      const d=days.find(x=>x.id===editCell.dayId);
      return(<div onClick={e=>{if(e.target===e.currentTarget)setEditCell(null);}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
        <div style={{background:'#fff',borderRadius:12,padding:20,width:300,border:'0.5px solid #ddd'}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{m?.name} — {d?.label}</div>
          <div style={{fontSize:11,color:'#888',marginBottom:14}}>{m?.role}</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:'#888',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Heure d'arrivée</div>
            <input value={editHeure} onChange={e=>setEditHeure(e.target.value)} placeholder="ex: 16:00 / F" style={{width:'100%',padding:'8px 10px',fontSize:13,border:'0.5px solid #ccc',borderRadius:7,boxSizing:'border-box',outline:'none'}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:'#888',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Note</div>
            <input value={editNote} onChange={e=>setEditNote(e.target.value)} placeholder="ex: Salle – Fromage – Check MEP" style={{width:'100%',padding:'8px 10px',fontSize:13,border:'0.5px solid #ccc',borderRadius:7,boxSizing:'border-box',outline:'none'}}/>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={clearCell} style={{padding:'7px 12px',fontSize:12,border:'0.5px solid #fca5a5',borderRadius:7,cursor:'pointer',background:'#fee2e2',color:'#991b1b'}}>Effacer</button>
            <div style={{flex:1}}/>
            <button onClick={()=>setEditCell(null)} style={{padding:'7px 12px',fontSize:12,border:'0.5px solid #ccc',borderRadius:7,cursor:'pointer',background:'#fff',color:'#555'}}>Annuler</button>
            <button onClick={saveCell} style={{padding:'7px 14px',fontSize:12,border:'0.5px solid #378ADD',borderRadius:7,cursor:'pointer',background:'#378ADD',color:'#fff',fontWeight:600}}>OK</button>
          </div>
        </div>
      </div>);
    })()}
  </div>);
}

// ─── Login Screen ─────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  async function handleLogin(){
    const fb=getFirebase();
    if(!fb){setError('Firebase non initialisé. Rechargez la page.');return;}
    setLoading(true);setError('');
    try{
      await fb.signInWithEmailAndPassword(fb.auth,email,password);
      onLogin();
    }catch(e){
      setError('Email ou mot de passe incorrect.');
    }finally{setLoading(false);}
  }

  return(
    <div style={{minHeight:'100vh',background:'#f5f4f0',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'system-ui,sans-serif'}}>
      <div style={{background:'#fff',borderRadius:16,padding:32,width:320,border:'0.5px solid #d4d2c8',boxShadow:'0 4px 24px rgba(0,0,0,.07)'}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:11,letterSpacing:'.12em',color:'#888',textTransform:'uppercase',marginBottom:4}}>Le Louis XV</div>
          <div style={{fontSize:18,fontWeight:700,color:'#1a1a1a'}}>Carcasse &amp; Compo</div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:'#888',marginBottom:4}}>Email</div>
          <input
            type="email"
            value={email}
            onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleLogin()}
            placeholder="votre@email.com"
            style={{width:'100%',padding:'9px 12px',fontSize:13,border:'0.5px solid #ccc',borderRadius:8,boxSizing:'border-box',outline:'none'}}
          />
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,color:'#888',marginBottom:4}}>Mot de passe</div>
          <input
            type="password"
            value={password}
            onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleLogin()}
            placeholder="••••••••"
            style={{width:'100%',padding:'9px 12px',fontSize:13,border:'0.5px solid #ccc',borderRadius:8,boxSizing:'border-box',outline:'none'}}
          />
        </div>
        {error&&<div style={{fontSize:12,color:'#dc2626',marginBottom:12,textAlign:'center'}}>{error}</div>}
        <button
          onClick={handleLogin}
          disabled={loading}
          style={{width:'100%',padding:'10px',background:'#1a1a1a',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:loading?'default':'pointer',opacity:loading?0.6:1}}
        >{loading?'Connexion…':'Se connecter'}</button>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [authState,setAuthState]=useState('checking'); // 'checking' | 'logged-out' | 'logged-in'
  const [userEmail,setUserEmail]=useState('');
  const [tab,setTab]=useState('carcasse');
  const [services,setServices]=useState(DEFAULT_SERVICES);
  const [tables,setTables]=useState(()=>buildDefault(DEFAULT_SERVICES));
  const [terrasseMode,setTerrasseMode]=useState(()=>Object.fromEntries(DEFAULT_SERVICES.map(s=>[s.id,false])));
  const [manual,setManual]=useState(()=>Object.fromEntries(DEFAULT_SERVICES.map(s=>[s.id,{}])));
  const [currentService,setCurrentService]=useState('mar-d');
  const [compos,setCompos]=useState(()=>Object.fromEntries(DEFAULT_SERVICES.map(s=>[s.id,buildEmptyCompo()])));
  const [team,setTeam]=useState(INITIAL_TEAM);
  const [planning,setPlanning]=useState({weekLabel:'',days:[{id:'lun',label:'Lundi'},{id:'mar',label:'Mardi'},{id:'mer',label:'Mercredi'},{id:'jeu',label:'Jeudi'},{id:'ven',label:'Vendredi'},{id:'sam',label:'Samedi'},{id:'dim',label:'Dimanche'}],entries:{}});
  const [modal,setModal]=useState(null);
  const [showSvc,setShowSvc]=useState(false);
  const [showLinge,setShowLinge]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [showCopyCarcasse,setShowCopyCarcasse]=useState(false);
  const [syncStatus,setSyncStatus]=useState('idle'); // 'idle' | 'saving' | 'saved' | 'error'
  const saveTimerRef=useRef(null);
  const unsubscribeRef=useRef(null);

  // Auth listener
  useEffect(()=>{
    const fb=getFirebase();
    if(!fb){setAuthState('logged-out');return;}
    const unsub=fb.onAuthStateChanged(fb.auth,user=>{
      if(user){setAuthState('logged-in');setUserEmail(user.email||'');}
      else{setAuthState('logged-out');}
    });
    return()=>unsub();
  },[]);

  // Firestore real-time listener (when logged in)
  useEffect(()=>{
    if(authState!=='logged-in')return;
    const fb=getFirebase();
    if(!fb)return;
    const ref=fb.doc(fb.db,'app','state');
    const unsub=fb.onSnapshot(ref,snap=>{
      if(!snap.exists())return;
      const p=snap.data();
      if(p.services?.length>0)setServices(p.services);
      if(p.tables)setTables(p.tables);
      if(p.terrasseMode)setTerrasseMode(p.terrasseMode);
      if(p.manual)setManual(p.manual);
      if(p.currentService)setCurrentService(p.currentService);
      if(p.compos)setCompos(p.compos);
      if(p.team){
        const merged=p.team.map(saved=>{const ini=INITIAL_TEAM.find(m=>m.id===saved.id);return{...saved,gender:saved.gender||(ini?.gender??'m')};});
        setTeam(merged);
      }
      if(p.planning)setPlanning(p.planning);
    },(err)=>{console.error('Firestore error',err);setSyncStatus('error');});
    unsubscribeRef.current=unsub;
    return()=>{if(unsubscribeRef.current)unsubscribeRef.current();};
  },[authState]);

  const save=useCallback((svcList,tbl,ter,man,curSvc,cps,tm,pl)=>{
    const planningToSave=pl||planning;
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({services:svcList,tables:tbl,terrasseMode:ter,manual:man,currentService:curSvc,compos:cps,team:tm,planning:planningToSave}));}catch(e){}
    const fb=getFirebase();
    if(!fb||authState!=='logged-in')return;
    setSyncStatus('saving');
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(async()=>{
      try{
        const ref=fb.doc(fb.db,'app','state');
        await fb.setDoc(ref,{services:svcList,tables:tbl,terrasseMode:ter,manual:man,currentService:curSvc,compos:cps,team:tm,planning:planningToSave});
        setSyncStatus('saved');
        setTimeout(()=>setSyncStatus('idle'),2000);
      }catch(e){console.error('Save error',e);setSyncStatus('error');}
    },800);
  },[authState,planning]);

  async function handleLogout(){
    const fb=getFirebase();
    if(!fb)return;
    await fb.signOut(fb.auth);
  }

  if(authState==='checking'){
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#f5f4f0',fontFamily:'system-ui,sans-serif',color:'#888',fontSize:14}}>Chargement…</div>;
  }
  if(authState==='logged-out'){
    return <LoginScreen onLogin={()=>{}}/>;
  }

  const svcData=tables[currentService]||{};const currentSvcObj=services.find(s=>s.id===currentService);const man=manual[currentService]||{};
  let ts=0,tt=0,cs=0,ct=0;SALLE.forEach(tn=>{const d=svcData[tn];if(d&&d.covers>0&&!d.isConsole){ts+=d.covers;cs+=getCavallino(tn,d.covers);}});TERRASSE.forEach(tn=>{const d=svcData[tn];if(d&&d.covers>0&&!d.isConsole){tt+=d.covers;ct+=getCavallino(tn,d.covers);}});

    {showLinge&&(<div style={{position:'fixed',inset:0,zIndex:300,overflowY:'auto',background:'#f5f4f0',padding:16}}><div style={{maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,paddingBottom:10,borderBottom:'1px solid #d4d2c8'}}><span style={{fontSize:16,fontWeight:700}}>Linge</span><button onClick={()=>setShowLinge(false)} style={{background:'#1a1a1a',color:'#fff',border:'none',borderRadius:6,padding:'7px 14px',fontSize:12,cursor:'pointer'}}>Fermer</button></div>
      {[{title:'Semaine complète',bg:'#fff',nObj:lingeData.wkN,f:lingeData.wkF},{title:'Vendredi + Samedi',bg:'#ede9fe',nObj:lingeData.vsN,f:lingeData.vsF}].map(({title,bg,nObj,f})=>(<div key={title} style={{background:bg,borderRadius:8,padding:12,marginBottom:10}}><div style={{fontSize:12,fontWeight:700,color:'#1a1a1a',marginBottom:8}}>{title}</div><div style={{fontSize:11,color:'#888',marginBottom:4,textTransform:'uppercase',letterSpacing:'.04em'}}>Nappes</div>{[180,200,220,260,280].filter(k=>nObj[k]>0).map(k=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12}}><span style={{color:'#555'}}>{PL+k}</span><span style={{fontWeight:600}}>{nObj[k]}</span></div>)}<div style={{fontSize:11,color:'#888',marginTop:8,marginBottom:4,textTransform:'uppercase',letterSpacing:'.04em'}}>Serviettes</div><div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12}}><span style={{color:'#555'}}>Serviettes ×25 par paquet</span><span style={{fontWeight:600}}>{(Math.ceil(f/25)||0)+' paquet'+(Math.ceil(f/25)>1?'s':'')}</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12}}><span style={{color:'#555'}}>Serviettes à dessert ×50 par paquet</span><span style={{fontWeight:600}}>{(Math.ceil(f/50)||0)+' paquet'+(Math.ceil(f/50)>1?'s':'')}</span></div></div>))}
    </div></div>)}

    {showCopyCarcasse&&(<div onClick={e=>{if(e.target===e.currentTarget)setShowCopyCarcasse(false);}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}><div style={{background:'#fff',borderRadius:12,padding:24,width:320,border:'0.5px solid #ddd',maxHeight:'80vh',overflowY:'auto'}}>
      <div style={{fontSize:15,fontWeight:600,marginBottom:12}}>Initialiser la carcasse</div>
      <div style={{fontSize:11,fontWeight:600,color:'#555',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>Copier depuis</div>
      {services.filter(s=>s.id!==currentService).map(s=>{const sd=tables[s.id];return(<button key={s.id} onClick={()=>{const newT=dc(tables);newT[currentService]={};[...SALLE,...TERRASSE].forEach(tn=>{newT[currentService][tn]=dc((sd&&sd[tn])||mkoff());});setTables(newT);save(services,newT,terrasseMode,manual,currentService,compos,team);setShowCopyCarcasse(false);}} style={{display:'block',width:'100%',marginBottom:6,padding:'9px 12px',border:'0.5px solid #378ADD',borderRadius:8,cursor:'pointer',background:'#dbeafe',color:'#1e40af',fontSize:13,fontWeight:500,textAlign:'left'}}>{s.label}</button>);})}
      <button onClick={()=>{const newT=dc(tables);newT[currentService]={};[...SALLE,...TERRASSE].forEach(tn=>{newT[currentService][tn]=mkoff();});setTables(newT);save(services,newT,terrasseMode,manual,currentService,compos,team);setShowCopyCarcasse(false);}} style={{display:'block',width:'100%',marginTop:8,padding:'10px',border:'0.5px solid #ccc',borderRadius:8,cursor:'pointer',background:'#fff',color:'#555',fontSize:13}}>Remettre à zéro</button>
      <button onClick={()=>setShowCopyCarcasse(false)} style={{display:'block',width:'100%',marginTop:6,padding:'8px',border:'none',background:'none',cursor:'pointer',color:'#aaa',fontSize:12}}>Annuler</button>
    </div></div>)}
    {showExport&&<CarcasseExport onClose={()=>setShowExport(false)} services={services} tables={tables} currentService={currentService} manual={manual}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
