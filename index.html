function defaultPlateau(c){if(c<=2)return 100;if(c<=4)return 120;if(c<=6)return 140;if(c<=8)return 180;return 200;}
function suggestPlateau(tn,c,svcData){if(tn==='AQUA')return 120;if(c<=0)return null;if(tn==='4'){const t3B=svcData&&svcData['3B'];if(t3B&&t3B.covers>0)return 100;return c<=4?120:defaultPlateau(c);}const T120=['AS','3','5','6','7B','15','17','19'];if(T120.includes(tn)&&c<=4)return 120;return defaultPlateau(c);}

function computeTransfers(upList,dnList){const upQ=upList.map(x=>({...x})),dnQ=dnList.map(x=>({...x})),transfers=[];const isSl=tn=>SALLE.includes(tn),isTr=tn=>TERRASSE.includes(tn);const sz=(a,b)=>(isSl(a)&&isSl(b))||(isTr(a)&&isTr(b));for(let pass=0;pass<2;pass++){for(let i=0;i<upQ.length;i++){if(!upQ[i].n)continue;for(let j=0;j<dnQ.length;j++){if(!dnQ[j].n)continue;if(pass===0&&!sz(upQ[i].tn,dnQ[j].tn))continue;const give=Math.min(upQ[i].n,dnQ[j].n);if(give>0)transfers.push({from:dnQ[j].tn,to:upQ[i].tn,n:give});upQ[i].n-=give;dnQ[j].n-=give;if(!upQ[i].n)break;}}}return{transfers,netUp:upQ.filter(x=>x.n>0),netDn:dnQ.filter(x=>x.n>0)};}

function match1to1(neededList,releasedList,matchKey){const nedQ=neededList.map(x=>({...x,used:false})),relQ=releasedList.map(x=>({...x,used:false}));const transfers=[],usedTo={},usedFrom={};const isSl=tn=>SALLE.includes(tn),isTr=tn=>TERRASSE.includes(tn);const sz=(a,b)=>(isSl(a)&&isSl(b))||(isTr(a)&&isTr(b));for(let pass=0;pass<2;pass++){for(let i=0;i<nedQ.length;i++){const ned=nedQ[i];if(ned.used)continue;for(let j=0;j<relQ.length;j++){const rel=relQ[j];if(rel.used)continue;if(rel[matchKey]!==ned[matchKey])continue;if(rel.tn===ned.tn)continue;if(pass===0&&!sz(rel.tn,ned.tn))continue;if(usedTo[ned.tn]||usedFrom[rel.tn])continue;const item={fromTn:rel.tn,toTn:ned.tn,[matchKey]:rel[matchKey]};if(rel.pied!==undefined)item.pied=rel.pied;transfers.push(item);usedTo[ned.tn]=true;usedFrom[rel.tn]=true;rel.used=true;ned.used=true;break;}}}return{transfers,ascents:nedQ.filter(x=>!x.used),descents:relQ.filter(x=>!x.used)};}

function getSalleEmpireData(tables,depId,interId,arrId){
  const depSvc=tables[depId],interSvc=tables[interId],arrSvc=tables[arrId];
  if(!depSvc||!interSvc||!arrSvc)return null;
  const allT=[...SALLE,...TERRASSE];
  const plSwapS2R={},plSwapR2S={},piedSwapS2R={petit:0,gros:0},piedSwapR2S={petit:0,gros:0},tnsPlSwap=[];
  allT.forEach(tn=>{const iv=interSvc[tn],a=arrSvc[tn];const iA=!!(iv&&iv.covers>0),aA=!!(a&&a.covers>0);if(!iA||!aA)return;const iPl=iv.plateau,aPl=a.plateau;if(iPl===aPl)return;if(!tnsPlSwap.includes(tn))tnsPlSwap.push(tn);if(iPl)plSwapS2R[iPl]=(plSwapS2R[iPl]||0)+1;if(aPl)plSwapR2S[aPl]=(plSwapR2S[aPl]||0)+1;if(iPl&&aPl){const iPied=piedFromPlateau(iPl),aPied=piedFromPlateau(aPl);if(iPied!==aPied){piedSwapS2R[iPied]=(piedSwapS2R[iPied]||0)+1;piedSwapR2S[aPied]=(piedSwapR2S[aPied]||0)+1;}}});
  const plCount=(svc,excludeSwap)=>{const m={};allT.forEach(tn=>{const d=svc[tn];if(!d||d.covers<=0||!d.plateau)return;if(excludeSwap&&tnsPlSwap.includes(tn))return;m[d.plateau]=(m[d.plateau]||0)+1;});return m;};
  const piedCount=(svc,excludeSwap)=>{let petit=0,gros=0;allT.forEach(tn=>{const d=svc[tn];if(!d||d.covers<=0||!d.plateau)return;if(excludeSwap&&tnsPlSwap.includes(tn))return;if(piedFromPlateau(d.plateau)==='petit')petit++;else gros++;});return{petit,gros};};
  const fauteuilCount=svc=>{let n=0;allT.forEach(tn=>{const d=svc[tn];if(d&&d.covers>0&&!d.isConsole)n+=d.covers;});return n;};
  const cavallinoCount=svc=>{let n=0;allT.forEach(tn=>{const d=svc[tn];if(d&&d.covers>0&&!d.isConsole)n+=getCavallino(tn,d.covers);});return n;};
  const depPl=plCount(depSvc,false),interPl=plCount(interSvc,true),arrPl=plCount(arrSvc,true);
  const depPied=piedCount(depSvc,false),interPied=piedCount(interSvc,true),arrPied=piedCount(arrSvc,true);
  const depF=fauteuilCount(depSvc),interF=fauteuilCount(interSvc),arrF=fauteuilCount(arrSvc);
  const depC=cavallinoCount(depSvc),interC=cavallinoCount(interSvc),arrC=cavallinoCount(arrSvc);
  const mv=(D,M,J)=>({salleEmpire:Math.max(0,Math.min(D,J)-M),salleReserve:Math.max(0,D-M-J),reserveSalle:Math.max(0,M-D),reserveEmpire:Math.max(0,J-D)});
  const allPlSizes=[...new Set([...Object.keys(depPl),...Object.keys(interPl),...Object.keys(arrPl),...Object.keys(plSwapS2R),...Object.keys(plSwapR2S)].map(Number))].sort((a,b)=>a-b);
  const plMvt={};
  allPlSizes.forEach(pl=>{const r=mv(depPl[pl]||0,interPl[pl]||0,arrPl[pl]||0);r.salleReserve+=(plSwapS2R[pl]||0);r.reserveSalle+=(plSwapR2S[pl]||0);if(r.salleEmpire||r.salleReserve||r.reserveSalle||r.reserveEmpire)plMvt[pl]=r;});
  const piedMvt={};
  ['petit','gros'].forEach(p=>{const r=mv(depPied[p]||0,interPied[p]||0,arrPied[p]||0);r.salleReserve+=piedSwapS2R[p]||0;r.reserveSalle+=piedSwapR2S[p]||0;if(r.salleEmpire||r.salleReserve||r.reserveSalle||r.reserveEmpire)piedMvt[p]=r;});
  const fMvt=mv(depF,interF,arrF);
  const cMvt=mv(depC,interC,arrC);
  return{plMvt,piedMvt,fMvt,cMvt};
}

function getMvtData(tables,services,currentService){
  const idx=services.findIndex(s=>s.id===currentService);let prevId=null;
  if(currentService==='mar-d-next')prevId='sam-d';else if(idx>0)prevId=services[idx-1].id;
  if(!prevId)return null;
  const prevSvc=tables[prevId],currSvc=tables[currentService];if(!prevSvc||!currSvc)return null;
  const allT=[...SALLE,...TERRASSE];const cN=countNappes(currSvc);
  const plNeeded=[],plReleased=[],piedNeeded=[],piedReleased=[],fauteuilsUp=[],fauteuilsDn=[],cavallinoUp=[],cavallinoDn=[];
  allT.forEach(tn=>{const pd=prevSvc[tn]||null,cd=currSvc[tn]||null;const pAct=pd&&pd.covers>0,cAct=cd&&cd.covers>0;const pPl=pAct?pd.plateau:null,cPl=cAct?cd.plateau:null;const pCons=pAct&&pd.isConsole,cCons=cAct&&cd.isConsole;const pPied=pPl?piedFromPlateau(pPl):null,cPied=cPl?piedFromPlateau(cPl):null;if(pAct&&!cAct){if(pPl)plReleased.push({tn,pl:pPl,pied:pPied});piedReleased.push({tn,pied:pPied});}else if(!pAct&&cAct){if(cPl)plNeeded.push({tn,pl:cPl,pied:cPied});piedNeeded.push({tn,pied:cPied});}else if(pAct&&cAct){if(pPl!==cPl){if(pPl)plReleased.push({tn,pl:pPl,pied:pPied});if(cPl)plNeeded.push({tn,pl:cPl,pied:cPied});}if(pPied!==cPied){piedReleased.push({tn,pied:pPied});piedNeeded.push({tn,pied:cPied});}}if(pAct&&!cAct){if(!pCons){fauteuilsDn.push({tn,n:pd.covers});const cv=getCavallino(tn,pd.covers);if(cv>0)cavallinoDn.push({tn,n:cv});}}else if(!pAct&&cAct){if(!cCons){fauteuilsUp.push({tn,n:cd.covers});const cv=getCavallino(tn,cd.covers);if(cv>0)cavallinoUp.push({tn,n:cv});}}else if(pAct&&cAct){if(!pCons&&!cCons){const df=cd.covers-pd.covers;if(df>0)fauteuilsUp.push({tn,n:df});if(df<0)fauteuilsDn.push({tn,n:-df});}else if(pCons&&!cCons)fauteuilsUp.push({tn,n:cd.covers});else if(!pCons&&cCons)fauteuilsDn.push({tn,n:pd.covers});const pc=getCavallino(tn,pCons?0:pd.covers),cc=getCavallino(tn,cCons?0:cd.covers);if(cc>pc)cavallinoUp.push({tn,n:cc-pc});if(pc>cc)cavallinoDn.push({tn,n:pc-cc});}});
  const plR=match1to1(plNeeded,plReleased,'pl');const piR=match1to1(piedNeeded,piedReleased,'pied');const fTr=computeTransfers(fauteuilsUp,fauteuilsDn);const cTr=computeTransfers(cavallinoUp,cavallinoDn);
  // Batteries: only for the last service before mar-d-next
  // = number of active tables (covers>0) in mar-d-next, 1 battery per table regardless of pied or OFF
  let batteries=0;
  const marNextSvc=tables['mar-d-next'];
  const isLastBeforeNext=currentService==='sam-d'||(()=>{const idx2=services.findIndex(s=>s.id===currentService);const nextSvc=services[idx2+1];return nextSvc&&nextSvc.id==='mar-d-next';})();
  if(isLastBeforeNext&&marNextSvc){[...SALLE,...TERRASSE].forEach(tn=>{const d=marNextSvc[tn];if(d&&d.covers>0)batteries++;});}
  return{plAscents:plR.ascents,plDescents:plR.descents,plTransfers:plR.transfers,piedAscents:piR.ascents,piedDescents:piR.descents,piedTransfers:piR.transfers,fTr,cTr,upN220:cN.n220,upN260:cN.n260,upN280:cN.n280,batteries,prevLabel:services.find(s=>s.id===prevId)?.label??prevId};
}

function getLingeData(tables,services){

  const extraIds=services.filter(s=>s.extra).map(s=>s.id);const allIds=[...WK_IDS,...extraIds].filter(id=>services.some(s=>s.id===id));
  function countLN(sd){const cnt={180:0,200:0,220:0,260:0,280:0};[...SALLE,...TERRASSE].forEach(tn=>{const d=sd[tn];if(d&&d.covers>0&&d.plateau&&LINGE_NAPPE_MAP[d.plateau])cnt[LINGE_NAPPE_MAP[d.plateau]]++;});return cnt;}

function sameTableSet(a,b){return a.length===b.length&&a.every(x=>b.includes(x));}
function activeTablesFor(list,svcData){return list.filter(tn=>{const d=svcData[tn];return d&&d.covers>0&&!d.isConsole;});}

// Nom automatique pour un ensemble de tables : "Salle" si toutes les tables ACTIVES de la salle
// (hors Aqua) sont présentes, "Terrasse" si toutes les tables ACTIVES de la terrasse, sinon la liste triée.
function autoNameForTableIds(ids,svcData){
  if(ids.length===0)return 'Rang';
  const activeSalle=activeTablesFor(SALLE.filter(t=>t!=='AQUA'),svcData||{});
  const activeTerrasse=activeTablesFor(TERRASSE,svcData||{});
  if(activeSalle.length>0&&sameTableSet(ids,activeSalle))return 'Salle';
  if(activeTerrasse.length>0&&sameTableSet(ids,activeTerrasse))return 'Terrasse';
  const TABLE_ORDER=[...SALLE,...TERRASSE];
  return [...ids].sort((a,b)=>TABLE_ORDER.indexOf(a)-TABLE_ORDER.indexOf(b)).join(' ')||'Rang';
}

// Nom affiché d'un rang : si le nom stocké est encore "auto" (liste des tables dans n'importe
// quel ordre, ou déjà "Salle"/"Terrasse"/"Rang"), on recalcule Salle/Terrasse/l'ordre canonique
// à l'affichage, sur la base des tables actives du service. Un nom réellement personnalisé reste intact.
function rangDisplayName(rang,svcData){
  const ids=rang.tableIds||[];
  if(ids.length===0)return rang.name||'Rang';
  const nameParts=(rang.name||'').split(' ').filter(Boolean);
  const isAuto=sameTableSet(nameParts,ids)||rang.name==='Nouveau rang'||rang.name==='Rang'||rang.name==='Salle'||rang.name==='Terrasse';
  if(!isAuto)return rang.name;
  return autoNameForTableIds(ids,svcData);
}

}

// Suggestion de date selon service et date du jour
const SVC_DAY_MAP={'mar-d':2,'mar-dj':2,'mar-d-next':2,'mer-d':3,'mer-dj':3,'jeu-d':4,'jeu-dj':4,'ven-dj':5,'ven-d':5,'sam-dj':6,'sam-d':6,'dim-dj':0,'dim-d':0};
// Le "jour" bascule à 3h du matin plutôt qu'à minuit (service qui déborde après minuit).
function businessNow(){
  const d=new Date();
  if(d.getHours()<3)d.setDate(d.getDate()-1);
  return d;
}
function suggestDateForSvc(svcId){
  const now=businessNow();
  const today=now.getDay();
  const target=SVC_DAY_MAP[svcId];
  if(target===undefined)return now;
  let diff=target-today;
  if(diff<0)diff+=7;
  const d=new Date(now);d.setDate(d.getDate()+diff);return d;
}
function fmtDateFR(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
// Clé locale (et non UTC) : évite le décalage d'un jour près de minuit, cohérent avec fmtDateFR.
function dateKey(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

// Semaine métier : mardi → lundi (7 jours). Renvoie la clé (date du mardi) pour une date donnée.
function weekKeyFor(dstr){
  const d=new Date(dstr+'T12:00:00');
  const dow=d.getDay();
  const sinceTue=(dow+7-2)%7;
  const start=new Date(d);start.setDate(start.getDate()-sinceTue);
  return dateKey(start);
}
function weekLabelFor(weekKeyStr){
  const start=new Date(weekKeyStr+'T12:00:00');
  const end=new Date(start);end.setDate(end.getDate()+6);
  return 'Semaine du '+fmtDateFR(start)+' au '+fmtDateFR(end);
}
async function fetchWeekOptions(){
  const fb=getFirebase();if(!fb)return[];
  try{
    const col=fb.collection(fb.db,'linge');
    const snap=await fb.getDocs(col);
    const items=[];snap.forEach(d=>items.push(d.data()));
    const byWeek={};
    items.forEach(it=>{
      if(!it.date)return;
      const wk=weekKeyFor(it.date);
      if(!byWeek[wk])byWeek[wk]=[];
      byWeek[wk].push(it);
    });
    return Object.entries(byWeek).map(([wk,entries])=>({weekKey:wk,label:weekLabelFor(wk),entries})).sort((a,b)=>b.weekKey.localeCompare(a.weekKey));
  }catch(e){console.error(e);return[];}
}
function buildWeekValsShared(entries,lingeItems){
  const v={};
  lingeItems.blanchisseur.forEach(it=>{v[it.id]={dj:0,dn:0};});
  lingeItems.elis.forEach(it=>{v[it.id]={dj:0,dn:0};});
  entries.forEach(entry=>{
    const ev=entry.vals||{};
    Object.keys(v).forEach(itemId=>{
      const cell=ev[itemId];if(!cell)return;
      v[itemId].dj+=parseInt(cell.dj)||0;
      v[itemId].dn+=parseInt(cell.dn)||0;
    });
  });
  const out={};
  Object.entries(v).forEach(([k,val])=>{out[k]={dj:val.dj?String(val.dj):'',dn:val.dn?String(val.dn):''};});
  return out;
}

// Calcule nappes depuis carcasse (hors AQUA)
function calcNappesFromCarcasse(svcData){
  const cnt={180:0,200:0,220:0,260:0,280:0};
  [...SALLE,...TERRASSE].forEach(tn=>{
    if(tn==='AQUA')return;
    const d=svcData[tn];
    if(d&&d.covers>0&&d.plateau&&LINGE_NAPPE_MAP[d.plateau])cnt[LINGE_NAPPE_MAP[d.plateau]]++;
  });
  return cnt;
}

function buildEmptyLinge(svcData,svcId){
  const nappes=calcNappesFromCarcasse(svcData);
  const isDj=svcId&&svcId.endsWith('-dj');
  const vals={};
  BLANCHISSEUR_ITEMS.forEach(it=>{
    const n=it.nappe?String(nappes[it.nappe]||''):'';
    vals[it.id]={dj:isDj?n:'',dn:isDj?'':n};
  });
  ELIS_ITEMS.forEach(it=>{vals[it.id]={dj:'',dn:''};});
  return vals;
}

    </div>
  </div>);
}

function LingeView({currentService,services,tables,userEmail,lingeItems}){
  const svcLabel=services.find(s=>s.id===currentService)?.label??'';

  // Detect if current service is dj or dn
  const isDjService=currentService.endsWith('-dj');
  const isDnService=!isDjService;

  // Find paired service (same day, other meal)
  const pairedId=isDjService
    ?services.find(s=>s.id===currentService.replace('-dj','-d'))?.id??null
    :services.find(s=>s.id===currentService.replace('-d','-dj'))?.id??null;

  const [pairedServiceId,setPairedServiceId]=useState(pairedId||'none');

  useEffect(()=>{
    const p=isDjService
      ?services.find(s=>s.id===currentService.replace('-dj','-d'))?.id??null
      :services.find(s=>s.id===currentService.replace('-d','-dj'))?.id??null;
    setPairedServiceId(p||'none');
    setDateConfirmed(false);
    setVals(null);
  },[currentService]);

  const djSvcId=isDjService?currentService:(pairedServiceId!=='none'?pairedServiceId:null);
  const dnSvcId=isDnService?currentService:(pairedServiceId!=='none'?pairedServiceId:null);
  const djSvcData=djSvcId?tables[djSvcId]||{}:{};
  const dnSvcData=dnSvcId?tables[dnSvcId]||{}:{};

  function buildVals(){
    const djNappes=calcNappesFromCarcasse(djSvcData);
    const dnNappes=calcNappesFromCarcasse(dnSvcData);
    const v={};
    lingeItems.blanchisseur.forEach(it=>{
      v[it.id]={
        dj:djSvcId&&it.nappe?String(djNappes[it.nappe]||''):'',
        dn:dnSvcId&&it.nappe?String(dnNappes[it.nappe]||''):'',
      };
    });
    lingeItems.elis.forEach(it=>{v[it.id]={dj:'',dn:''};});
    return v;
  }

  const [dateConfirmed,setDateConfirmed]=useState(false);
  const [dateDraft,setDateDraft]=useState('');
  const [dateObj,setDateObj]=useState(null);
  const [vals,setVals]=useState(null);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [showArchive,setShowArchive]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [archive,setArchive]=useState([]);
  const [archiveLoading,setArchiveLoading]=useState(false);

  // Récap semaine (agrège tous les articles saisis sur une semaine mar→sam)
  const [showWeekPicker,setShowWeekPicker]=useState(false);
  const [weekRecapLoading,setWeekRecapLoading]=useState(false);
  const [weekOptions,setWeekOptions]=useState([]);
  const [weekExportData,setWeekExportData]=useState(null);

  useEffect(()=>{
    const d=suggestDateForSvc(currentService);
    setDateDraft(dateKey(d));setDateObj(d);
  },[currentService]);

  function confirmDate(){
    if(!dateDraft)return;
    const d=new Date(dateDraft+'T12:00:00');
    if(isNaN(d.getTime()))return;
    setDateObj(d);setDateConfirmed(true);loadOrInit(d);
  }

  async function loadOrInit(d){
    const fb=getFirebase();if(!fb)return setVals(buildVals());
    const key=currentService+'_'+dateKey(d);
    try{
      const ref=fb.doc(fb.db,'linge',key);
      const snap=await fb.getDoc(ref);
      if(snap.exists()&&snap.data().vals){setVals(snap.data().vals);}
      else{setVals(buildVals());}
    }catch(e){setVals(buildVals());}
  }

  function setCell(itemId,col,value){
    setVals(prev=>({...prev,[itemId]:{...(prev[itemId]||{dj:'',dn:''}),[col]:value}}));
    setSaved(false);
  }

  async function saveToFirebase(){
    if(!vals||!dateObj)return;
    const fb=getFirebase();if(!fb)return;
    setSaving(true);
    const key=currentService+'_'+dateKey(dateObj);
    try{
      const ref=fb.doc(fb.db,'linge',key);
      await fb.setDoc(ref,{svcId:currentService,svcLabel,date:dateKey(dateObj),dateDisplay:fmtDateFR(dateObj),vals,savedBy:userEmail,savedAt:new Date().toISOString()});
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    }catch(e){console.error(e);}
    setSaving(false);
  }

  async function openArchive(){
    setShowArchive(true);setArchiveLoading(true);
    const fb=getFirebase();if(!fb){setArchiveLoading(false);return;}
    try{
      const col=fb.collection(fb.db,'linge');
      const snap=await fb.getDocs(col);
      const items=[];snap.forEach(d=>items.push(d.data()));
      items.sort((a,b)=>b.date.localeCompare(a.date));
      setArchive(items);
    }catch(e){console.error(e);}
    setArchiveLoading(false);
  }

  function groupByMonth(items){
    const m={};items.forEach(it=>{const k=it.date?it.date.slice(0,7):'';if(!m[k])m[k]=[];m[k].push(it);});
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  }

  async function openWeekPicker(){
    setShowWeekPicker(true);setWeekRecapLoading(true);setWeekExportData(null);
    const opts=await fetchWeekOptions();
    setWeekOptions(opts);
    setWeekRecapLoading(false);
  }

  function buildWeekVals(entries){
    return buildWeekValsShared(entries,lingeItems);
  }

  function selectWeek(opt){
    const vals=buildWeekVals(opt.entries);
    setWeekExportData({label:opt.label,vals});
    setShowWeekPicker(false);
  }

  const inputStyle={width:'100%',padding:'4px 2px',fontSize:13,fontWeight:600,border:'none',background:'transparent',textAlign:'center',outline:'none',color:'#1a1a1a'};
  const thStyle={fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.04em',padding:'6px 8px',textAlign:'center',borderBottom:'1px solid #e5e7eb'};

  // Available services for pairing (exclude current)
  const pairableServices=services.filter(s=>s.id!==currentService);

  return(<div style={{display:'flex',flexDirection:'column',gap:10}}>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',padding:'8px 12px',background:'#ececea',borderRadius:8,border:'0.5px solid #d4d2c8'}}>
      <span style={{fontSize:13,fontWeight:500}}>{svcLabel}</span>
      <div style={{flex:1}}/>
      <button onClick={openWeekPicker} style={{padding:'6px 12px',fontSize:12,border:'0.5px solid #ccc',borderRadius:6,cursor:'pointer',background:'#fff',color:'#555'}}>Récap semaine</button>
      <button onClick={openArchive} style={{padding:'6px 12px',fontSize:12,border:'0.5px solid #ccc',borderRadius:6,cursor:'pointer',background:'#fff',color:'#555'}}>Archive</button>
      {vals&&<button onClick={()=>setShowExport(true)} style={{padding:'6px 12px',fontSize:12,fontWeight:600,border:'0.5px solid #86efac',borderRadius:6,cursor:'pointer',background:'#dcfce7',color:'#166534'}}>Exporter</button>}
    </div>

    {/* Paired service selector */}
    <div style={{background:'#fff',borderRadius:10,padding:12,border:'0.5px solid #d4d2c8'}}>
      <div style={{fontSize:12,fontWeight:500,marginBottom:8,color:'#555'}}>
        {isDjService?'Service dîner associé (pour la colonne Dîner) :':'Service déjeuner associé (pour la colonne Déjeuner) :'}
      </div>
      <select value={pairedServiceId} onChange={e=>{setPairedServiceId(e.target.value);setVals(null);setDateConfirmed(false);}} style={{width:'100%',fontSize:13,padding:'7px 10px',borderRadius:7,border:'0.5px solid #ccc',background:'#fff'}}>
        <option value="none">Aucun (colonne vide)</option>
        {pairableServices.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
      </select>
    </div>

    {/* Date confirmation */}
    {!dateConfirmed&&(<div style={{background:'#fff',borderRadius:10,padding:16,border:'0.5px solid #d4d2c8'}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Date du service</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="date" value={dateDraft} onChange={e=>setDateDraft(e.target.value)} style={{flex:1,padding:'9px 12px',fontSize:14,border:'0.5px solid #ccc',borderRadius:8,outline:'none'}}/>
        <button onClick={confirmDate} style={{padding:'9px 18px',fontSize:13,fontWeight:600,border:'0.5px solid #378ADD',borderRadius:8,cursor:'pointer',background:'#378ADD',color:'#fff'}}>Confirmer</button>
      </div>
      <div style={{fontSize:11,color:'#aaa',marginTop:6}}>Date proposée selon le service.</div>
    </div>)}

    {/* Table */}
    {dateConfirmed&&vals&&(<div style={{background:'#fff',borderRadius:10,border:'0.5px solid #d4d2c8',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr>
            <th style={{...thStyle,textAlign:'left',width:'50%'}}>Article</th>
            <th style={thStyle}>Déjeuner</th>
            <th style={thStyle}>Dîner</th>
            <th style={thStyle}>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colSpan={3} style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',background:'#1a1a1a',color:'#fff',padding:'4px 8px'}}>Blanchisseur</td></tr>
          {lingeItems.blanchisseur.map((it,i)=>{const v=vals[it.id]||{dj:'',dn:''};const tot=(parseInt(v.dj)||0)+(parseInt(v.dn)||0);return(<tr key={it.id} style={{background:i%2===0?'#fff':'#fafaf9'}}>
            <td style={{fontSize:12,color:'#1a1a1a',padding:'4px 8px',borderBottom:'0.5px solid #f0efe9'}}>{it.label}</td>
            <td style={{borderBottom:'0.5px solid #f0efe9',borderLeft:'0.5px solid #f0efe9'}}><input value={v.dj} onChange={e=>setCell(it.id,'dj',e.target.value)} onFocus={e=>e.target.select()} inputMode="numeric" style={inputStyle}/></td>
            <td style={{borderBottom:'0.5px solid #f0efe9',borderLeft:'0.5px solid #f0efe9'}}><input value={v.dn} onChange={e=>setCell(it.id,'dn',e.target.value)} onFocus={e=>e.target.select()} inputMode="numeric" style={inputStyle}/></td>
            <td style={{borderBottom:'0.5px solid #f0efe9',borderLeft:'0.5px solid #f0efe9',textAlign:'center',fontSize:12,fontWeight:700,color:tot>0?'#1a1a1a':'#ccc'}}>{tot>0?tot:''}</td>
          </tr>);})}
          <tr><td colSpan={4} style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',background:'#1a1a1a',color:'#fff',padding:'4px 8px'}}>Elis</td></tr>
          {lingeItems.elis.map((it,i)=>{const v=vals[it.id]||{dj:'',dn:''};const tot=(parseInt(v.dj)||0)+(parseInt(v.dn)||0);return(<tr key={it.id} style={{background:i%2===0?'#fff':'#fafaf9'}}>
            <td style={{fontSize:12,color:'#1a1a1a',padding:'4px 8px',borderBottom:'0.5px solid #f0efe9'}}>{it.label}</td>
            <td style={{borderBottom:'0.5px solid #f0efe9',borderLeft:'0.5px solid #f0efe9'}}><input value={v.dj} onChange={e=>setCell(it.id,'dj',e.target.value)} onFocus={e=>e.target.select()} inputMode="numeric" style={inputStyle}/></td>
            <td style={{borderBottom:'0.5px solid #f0efe9',borderLeft:'0.5px solid #f0efe9'}}><input value={v.dn} onChange={e=>setCell(it.id,'dn',e.target.value)} onFocus={e=>e.target.select()} inputMode="numeric" style={inputStyle}/></td>
            <td style={{borderBottom:'0.5px solid #f0efe9',borderLeft:'0.5px solid #f0efe9',textAlign:'center',fontSize:12,fontWeight:700,color:tot>0?'#1a1a1a':'#ccc'}}>{tot>0?tot:''}</td>
          </tr>);})}
        </tbody>
      </table>
      <div style={{padding:'10px 12px',display:'flex',alignItems:'center',gap:8,borderTop:'0.5px solid #e5e7eb'}}>
        <span style={{fontSize:11,color:'#aaa',flex:1}}>{fmtDateFR(dateObj)}</span>
        {saved&&<span style={{fontSize:11,color:'#22c55e',fontWeight:600}}>Sauvegardé</span>}
        <button onClick={saveToFirebase} disabled={saving} style={{padding:'7px 18px',fontSize:12,fontWeight:600,border:'0.5px solid #378ADD',borderRadius:8,cursor:'pointer',background:'#378ADD',color:'#fff',opacity:saving?0.6:1}}>{saving?'Sauvegarde…':'Sauvegarder'}</button>
      </div>
    </div>)}

    {/* Archive modal */}
    {showArchive&&(<div onClick={e=>{if(e.target===e.currentTarget)setShowArchive(false);}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
      <div style={{background:'#f5f4f0',borderRadius:12,padding:20,width:360,maxHeight:'80vh',overflowY:'auto',border:'0.5px solid #ddd'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontWeight:700,fontSize:14}}>Archive</span>
          <button onClick={()=>setShowArchive(false)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#888'}}>×</button>
        </div>
        {archiveLoading&&<div style={{textAlign:'center',color:'#aaa',fontSize:13,padding:'20px 0'}}>Chargement…</div>}
        {!archiveLoading&&archive.length===0&&<div style={{textAlign:'center',color:'#aaa',fontSize:13,padding:'20px 0'}}>Aucune entrée.</div>}
        {!archiveLoading&&groupByMonth(archive).map(([month,items])=>{
          const [y,m]=month.split('-');
          const monthLabel=new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
          return(<AccordionMonth key={month} monthLabel={monthLabel}>
            {items.map(it=>{
              const parts=(it.dateDisplay||'').split('/');
              const fullDate=parts.length===3?new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0])).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):(it.dateDisplay||'');
              return(<div key={it.date+'_'+it.svcId} style={{background:'#fff',borderRadius:8,padding:'8px 12px',marginBottom:4,border:'0.5px solid #e5e7eb',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:'#1a1a1a',textTransform:'capitalize'}}>{fullDate}</div>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button onClick={()=>{setShowArchive(false);if(it.vals)setVals(it.vals);setDateConfirmed(true);const parts2=(it.dateDisplay||'').split('/');if(parts2.length===3)setDateObj(new Date(parseInt(parts2[2]),parseInt(parts2[1])-1,parseInt(parts2[0])));setShowExport(true);}} style={{fontSize:11,padding:'3px 10px',border:'0.5px solid #86efac',borderRadius:6,cursor:'pointer',background:'#dcfce7',color:'#166534'}}>Voir</button>
                {!isLinge(userEmail)&&<button onClick={async()=>{const fb=getFirebase();if(!fb)return;const key=it.svcId+'_'+it.date;try{await fb.deleteDoc(fb.doc(fb.db,'linge',key));setArchive(prev=>prev.filter(x=>!(x.svcId===it.svcId&&x.date===it.date)));}catch(e){console.error(e);}}} style={{fontSize:16,padding:'2px 8px',border:'none',borderRadius:4,cursor:'pointer',background:'#fee2e2',color:'#991b1b',lineHeight:1}}>×</button>}
              </div>
            </div>);})}

          </AccordionMonth>);
        })}
      </div>
    </div>)}

    {showExport&&vals&&<LingeExport onClose={()=>setShowExport(false)} svcLabel={svcLabel} dateStr={fmtDateFR(dateObj)} vals={vals} lingeItems={lingeItems}/>}

    {/* Sélecteur de semaine pour le récap */}
    {showWeekPicker&&(<div onClick={e=>{if(e.target===e.currentTarget)setShowWeekPicker(false);}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
      <div style={{background:'#f5f4f0',borderRadius:12,padding:20,width:360,maxHeight:'80vh',overflowY:'auto',border:'0.5px solid #ddd'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontWeight:700,fontSize:14}}>Récap semaine</span>
          <button onClick={()=>setShowWeekPicker(false)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#888'}}>×</button>
        </div>
        {weekRecapLoading&&<div style={{textAlign:'center',color:'#aaa',fontSize:13,padding:'20px 0'}}>Chargement…</div>}
        {!weekRecapLoading&&weekOptions.length===0&&<div style={{textAlign:'center',color:'#aaa',fontSize:13,padding:'20px 0'}}>Aucune saisie enregistrée.</div>}
        {!weekRecapLoading&&weekOptions.map(opt=>(
          <button key={opt.weekKey} onClick={()=>selectWeek(opt)} style={{display:'block',width:'100%',textAlign:'left',padding:'10px 12px',marginBottom:6,fontSize:13,border:'0.5px solid #e5e7eb',borderRadius:8,cursor:'pointer',background:'#fff',color:'#1a1a1a'}}>
            {opt.label}
            <div style={{fontSize:11,color:'#888',marginTop:2}}>{opt.entries.length+' service'+(opt.entries.length>1?'s':'')+' saisi'+(opt.entries.length>1?'s':'')}</div>
          </button>
        ))}
      </div>
    </div>)}

    {weekExportData&&<LingeExport onClose={()=>setWeekExportData(null)} svcLabel="Récap semaine" dateStr={weekExportData.label} vals={weekExportData.vals} lingeItems={lingeItems}/>}

    {(()=>{
      const ld=getLingeData(tables,services);
      const hasWeek=Object.values(ld.wkN).some(v=>v>0)||ld.wkF>0;
      const hasVS=Object.values(ld.vsN).some(v=>v>0)||ld.vsF>0;
      if(!hasWeek)return null;
      return(<div style={{background:'#fff',borderRadius:10,border:'0.5px solid #d4d2c8',padding:12,marginTop:4}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color:'#888',marginBottom:10}}>Récapitulatif semaine</div>
        {[{title:'Semaine complète',nObj:ld.wkN,f:ld.wkF,bg:'#f9fafb',show:hasWeek},{title:'Vendredi + Samedi',nObj:ld.vsN,f:ld.vsF,bg:'#f5f3ff',show:hasVS}].filter(x=>x.show).map(({title,nObj,f,bg})=>(
          <div key={title} style={{background:bg,borderRadius:7,padding:10,marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:600,color:'#1a1a1a',marginBottom:6}}>{title}</div>
            {[180,200,220,260,280].filter(k=>nObj[k]>0).map(k=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'2px 0'}}><span style={{color:'#555'}}>Nappe {PL}{k}</span><span style={{fontWeight:600}}>{nObj[k]}</span></div>)}
            {f>0&&<><div style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'2px 0',marginTop:4}}><span style={{color:'#555'}}>Serviettes (×25)</span><span style={{fontWeight:600}}>{Math.ceil(f/25)} paquet{Math.ceil(f/25)>1?'s':''}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'2px 0'}}><span style={{color:'#555'}}>Serviettes à dessert (×50)</span><span style={{fontWeight:600}}>{Math.ceil(f/50)} paquet{Math.ceil(f/50)>1?'s':''}</span></div></>}
          </div>
        ))}
      </div>);
    })()}
  </div>);
}

function FromageExport({onClose,svcLabel,dateStr,vals,fromageList}){
  const outerRef=useRef(null),contentRef=useRef(null);
  const [scale,setScale]=useState(1);
  useEffect(()=>{
    function fit(){if(!outerRef.current||!contentRef.current)return;contentRef.current.style.transform='scale(1)';const aH=outerRef.current.clientHeight-16,aW=outerRef.current.clientWidth-16,cH=contentRef.current.scrollHeight,cW=contentRef.current.scrollWidth;setScale(Math.min(1,aH/cH,aW/cW));}
    let id=requestAnimationFrame(()=>{id=requestAnimationFrame(fit);});window.addEventListener('resize',fit);return()=>{cancelAnimationFrame(id);window.removeEventListener('resize',fit);};
  },[]);
  const today=dateKey(new Date());
  const thStyle={fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.04em',padding:'4px 8px',textAlign:'center',borderBottom:'1px solid #e5e7eb'};
  const tdLabel={fontSize:11,color:'#1a1a1a',padding:'3px 8px',borderBottom:'0.5px solid #f0efe9'};
  const tdVal={fontSize:12,fontWeight:600,color:'#1a1a1a',padding:'3px 8px',textAlign:'center',borderBottom:'0.5px solid #f0efe9'};
  const rows=fromageList.filter(it=>{const v=vals[it.id]||{};return (v.qty&&v.qty!=='0')||v.dluo;});
  return(<div style={{position:'fixed',inset:0,zIndex:300,background:'#f5f4f0',display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px',borderBottom:'1px solid #d4d2c8',background:'#fff',flexShrink:0}}>
      <div><div style={{fontSize:13,fontWeight:700}}>{svcLabel}</div><div style={{fontSize:10,color:'#888',marginTop:1}}>{'Inventaire Fromage · '+dateStr}</div></div>
      <button onClick={onClose} style={{background:'#1a1a1a',color:'#fff',border:'none',borderRadius:6,padding:'7px 14px',fontSize:12,cursor:'pointer'}}>Fermer</button>
    </div>
    <div ref={outerRef} style={{flex:1,overflow:'hidden',display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'8px'}}>
      <div ref={contentRef} style={{width:420,transformOrigin:'top center',transform:'scale('+scale+')'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#1a1a1a',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6,textAlign:'center'}}>{svcLabel+' · '+dateStr}</div>
        {rows.length===0?(<div style={{textAlign:'center',color:'#aaa',fontSize:12,padding:'20px 0'}}>Aucune saisie.</div>):(
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr><th style={{...thStyle,textAlign:'left'}}>Fromage</th><th style={thStyle}>Quantité</th><th style={thStyle}>DLUO</th></tr></thead>
          <tbody>
            {rows.map(it=>{const v=vals[it.id]||{};const isPast=v.dluo&&v.dluo<today;return(<tr key={it.id}><td style={tdLabel}>{it.name}</td><td style={tdVal}>{v.qty||''}</td><td style={{...tdVal,color:isPast?'#dc2626':'#1a1a1a',fontWeight:isPast?800:600}}>{v.dluo?fmtDateFR(new Date(v.dluo+'T12:00:00')):''}</td></tr>);})}
          </tbody>
        </table>)}
        <div style={{fontSize:8,color:'#aaa',textAlign:'right',marginTop:6}}>Le Louis XV – Alain Ducasse à l'Hôtel de Paris · Monaco</div>
      </div>
    </div>
  </div>);
}

function FromageView({currentService,services,userEmail,fromageList,setFromageList,saveFromageList}){

// ─── Groupe ────────────────────────────────────────────────────────────────
const FR_MONTHS_NORM = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
function stripAccents(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function guessDateFromText(txt){
  const norm = stripAccents((txt||'').toLowerCase());
  const m = norm.match(/(\d{1,2})\s+(janvier|fevrier|mars|avril|mai|juin|juillet|aout|septembre|octobre|novembre|decembre)/);
  if(!m) return dateKey(new Date());
  const day=parseInt(m[1]);
  const monthIdx=FR_MONTHS_NORM.indexOf(m[2]);
  if(monthIdx===-1) return dateKey(new Date());
  const now=new Date();
  let year=now.getFullYear();
  let d=new Date(year,monthIdx,day,12);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(d<today) d=new Date(year+1,monthIdx,day,12);
  return dateKey(d);
}

function isGroupeAlertLine(txt){
  return /\bø\b/i.test(txt) || /allergi/i.test(txt) || /pax\s+sans/i.test(txt) ||
    /personnes?\s+(ne\s+souhaite|sans)/i.test(txt) || /v[ée]g[ée]tarien|vegan/i.test(txt) ||
    /sans\s+(produits?|fruits?)/i.test(txt);
}
function parseGroupeMenuLines(lines){
  const gaps=[];
  for(let i=1;i<lines.length;i++) gaps.push(lines[i-1].y-lines[i].y);
  const sorted=[...gaps].sort((a,b)=>a-b);
  const median=sorted.length?sorted[Math.floor(sorted.length/2)]:12;
  const threshold=median*1.6+2;
  const seqs=[]; let current=[];
  lines.forEach((l,i)=>{
    if(i>0){
      const gap=lines[i-1].y-l.y;
      if(gap>threshold&&current.length){seqs.push(current);current=[];}
    }
    current.push(l);
  });
  if(current.length)seqs.push(current);

  return seqs.map(seqLines=>{
    const dishes=[];
    seqLines.forEach(l=>{
      const m=l.text.match(/^(\d+)\s*(\/\s*2)?\s*(.*)$/);
      if(m){
        const qty=m[1],half=!!m[2],rest=(m[3]||'').trim();
        const isAlert=isGroupeAlertLine(rest);
        dishes.push({portion:half?(qty+' × ½'):qty, name:isAlert?'':rest, desc:'', alerts:isAlert?[rest]:[]});
      } else if(dishes.length){
        const last=dishes[dishes.length-1];
        if(isGroupeAlertLine(l.text))last.alerts.push(l.text.trim());
        else if(!last.name)last.name=l.text.trim();
        else last.desc=(last.desc?last.desc+' ':'')+l.text.trim();
      } else {
        dishes.push({portion:'',name:l.text.trim(),desc:'',alerts:[]});
      }
    });
    return dishes;
  });
}

async function parseGroupePdfFile(file){
  const buf=await file.arrayBuffer();
  if(!window.pdfjsLib) throw new Error("pdf.js ne s'est pas chargé (pas de réseau, ou bloqué).");
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  const content=await page.getTextContent();
  let items=content.items.filter(it=>it.str&&it.str.trim()).map(it=>({str:it.str,x:it.transform[4],y:it.transform[5]}));
  if(items.length===0) throw new Error("Aucun texte trouvé dans ce PDF (page vide, ou contenu en image).");
  items.sort((a,b)=>b.y-a.y);
  const tol=6.5;
  const lineGroups=[];
  items.forEach(it=>{
    let line=lineGroups.find(l=>Math.abs(l.y-it.y)<tol);
    if(!line){line={y:it.y,items:[]};lineGroups.push(line);}
    line.items.push(it);
  });
  lineGroups.forEach(l=>l.items.sort((a,b)=>a.x-b.x));
  lineGroups.sort((a,b)=>b.y-a.y);
  const lines=lineGroups.map(l=>({y:l.y,text:l.items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim()})).filter(l=>l.text);

  const menuIdx=lines.findIndex(l=>/^\d+\s*Menus?\b/i.test(l.text));
  const headerLines=menuIdx===-1?lines:lines.slice(0,menuIdx);
  const menuLines=menuIdx===-1?[]:lines.slice(menuIdx);
  const headerText=headerLines.map(l=>l.text).join('\n').replace(/[\u2018\u2019\u02BC]/g,"'");

  function field(label,nextLabels){
    const idx=headerText.indexOf(label);
    if(idx===-1)return '';
    let start=idx+label.length,end=headerText.length;
    nextLabels.forEach(nl=>{const i=headerText.indexOf(nl,start);if(i!==-1&&i<end)end=i;});
    return headerText.slice(start,end).replace(/^[:\s]+/,'').trim();
  }
  const ALL=['Date :','Nom du client :','Facturation','Heure d\'arrivée :','Nombre de couverts :','Nombre de table(s) :','Observations cuisine'];
  const dateTxt=field('Date :',ALL.filter(l=>l!=='Date :'));
  const clientName=field('Nom du client :',ALL.filter(l=>l!=='Nom du client :'));
  const arrival=field('Heure d\'arrivée :',ALL.filter(l=>l!=='Heure d\'arrivée :'));
  const paxRaw=field('Nombre de couverts :',ALL.filter(l=>l!=='Nombre de couverts :'));
  const tablesRaw=field('Nombre de table(s) :',ALL.filter(l=>l!=='Nombre de table(s) :'));
  const obsRaw=field('Observations cuisine',[]);
  const pax=(paxRaw.match(/\d+/)||[''])[0];
  const tables=(tablesRaw.match(/\d+/)||[''])[0];
  const observations=obsRaw.split('\n').map(s=>s.replace(/^[&:\s]*p[aâ]tisserie\s*:?\s*/i,'').trim()).filter(Boolean);

  let menuName='',menuPax='',seqSourceLines=[];
  if(menuLines.length){
    const first=menuLines[0];
    const m=first.text.match(/^(\d+)\s*Menus?\s*(\S+)?/i);
    if(m){menuPax=m[1];menuName='Menu '+(m[2]||'');}
    seqSourceLines=menuLines.slice(1);
  }
  const sequences=parseGroupeMenuLines(seqSourceLines);

  return {
    dateGuess: guessDateFromText(dateTxt),
    dateTextRaw: dateTxt,
    clientName, arrival, pax: pax||'', tables: tables||'',
    observations: observations.length?observations:[''],
    menuName: menuName||'Menu', menuPax: menuPax||pax||'',
    sequences: sequences.length?sequences:[[{portion:'',name:'',desc:'',alerts:[]}]],
    _debug: {itemCount: items.length, lineCount: lines.length, menuIdx, dateTxt},
  };
}

            {d.desc&&<div style={{fontSize:12,color:'#555',marginTop:2}}>{d.desc}</div>}
            {(d.alerts||[]).map((a,ai)=><div key={ai} style={{fontSize:12,fontWeight:700,color:'#dc2626',marginTop:4}}>{a}</div>)}
          </div>
        </div>))}
      </div>
    ))}
  </div>);
}

function GroupeEditForm({draft,setDraft,onCancel,onSave,saving,error}){

  function setObs(i,v){setDraft(prev=>{const o=[...prev.observations];o[i]=v;return{...prev,observations:o};});}
  function addObs(){setDraft(prev=>({...prev,observations:[...prev.observations,'']}));}
  function removeObs(i){setDraft(prev=>({...prev,observations:prev.observations.filter((_,ix)=>ix!==i)}));}
  function setDish(si,di,field,v){setDraft(prev=>{const seqs=prev.sequences.map(s=>[...s]);seqs[si][di]={...seqs[si][di],[field]:v};return{...prev,sequences:seqs};});}
  function setDishAlerts(si,di,v){setDish(si,di,'alerts',v.split('\n').filter(x=>x!==undefined));}
  function addDish(si){setDraft(prev=>{const seqs=prev.sequences.map(s=>[...s]);seqs[si].push({portion:'',name:'',desc:'',alerts:[]});return{...prev,sequences:seqs};});}
  function removeDish(si,di){setDraft(prev=>{const seqs=prev.sequences.map(s=>[...s]);seqs[si]=seqs[si].filter((_,ix)=>ix!==di);return{...prev,sequences:seqs.filter(s=>s.length>0)};});}
  function addSequence(){setDraft(prev=>({...prev,sequences:[...prev.sequences,[{portion:'',name:'',desc:'',alerts:[]}]]}));}
  function removeSequence(si){setDraft(prev=>({...prev,sequences:prev.sequences.filter((_,ix)=>ix!==si)}));}

      </div>
      {draft._debug&&(<div style={{background:'#f3f4f6',border:'0.5px solid #d1d5db',borderRadius:8,padding:'8px 14px',fontSize:11,color:'#555',marginBottom:12,fontFamily:'monospace'}}>
        {'Diagnostic : '+draft._debug.itemCount+' morceaux de texte lus, '+draft._debug.lineCount+' lignes, ligne menu détectée : '+(draft._debug.menuIdx>=0?('#'+draft._debug.menuIdx):'non trouvée')+', date lue : "'+(draft._debug.dateTxt||'—')+'"'}

      {error&&<div style={{background:'#fef2f2',border:'0.5px solid #fecaca',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#991b1b',marginBottom:12}}>{error}</div>}
      <div style={{background:'#fff',borderRadius:10,border:'0.5px solid #d4d2c8',padding:16,marginBottom:12}}>
        <div style={lbl}>Nom du client</div>
        <input style={{...inp,marginBottom:10}} value={draft.clientName} onChange={e=>setField('clientName',e.target.value)}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div><div style={lbl}>Date</div><input type="date" style={inp} value={draft.dateGuess} onChange={e=>setField('dateGuess',e.target.value)}/></div>
          <div><div style={lbl}>Heure d'arrivée</div><input style={inp} value={draft.arrival} onChange={e=>setField('arrival',e.target.value)}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><div style={lbl}>Nombre de PAX</div><input style={inp} value={draft.pax} onChange={e=>setField('pax',e.target.value)}/></div>
          <div><div style={lbl}>Nombre de table(s)</div><input style={inp} value={draft.tables} onChange={e=>setField('tables',e.target.value)}/></div>

          <button onClick={()=>removeObs(i)} style={{fontSize:14,padding:'2px 10px',border:'none',borderRadius:6,cursor:'pointer',background:'#fee2e2',color:'#991b1b'}}>×</button>

      <div style={{background:'#fff',borderRadius:10,border:'0.5px solid #d4d2c8',padding:16,marginBottom:12}}>

              <input style={inp} placeholder="Portion" value={d.portion} onChange={e=>setDish(si,di,'portion',e.target.value)}/>
              <input style={inp} placeholder="Nom du plat" value={d.name} onChange={e=>setDish(si,di,'name',e.target.value)}/>

            <textarea style={{...inp,marginBottom:6,minHeight:44}} placeholder="Description" value={d.desc} onChange={e=>setDish(si,di,'desc',e.target.value)}/>

            <div style={{textAlign:'right',marginTop:6}}><button onClick={()=>removeDish(si,di)} style={{fontSize:11,padding:'3px 10px',border:'none',borderRadius:6,cursor:'pointer',background:'#fee2e2',color:'#991b1b'}}>Retirer ce plat</button></div>

        </div>
      ))}

      <div style={{display:'flex',gap:10,paddingBottom:20}}>

        <button onClick={onSave} disabled={saving} style={{flex:1,padding:'11px 0',fontSize:13,fontWeight:600,border:'0.5px solid #378ADD',borderRadius:8,cursor:'pointer',background:'#378ADD',color:'#fff',opacity:saving?0.6:1}}>{saving?'Sauvegarde…':'Sauvegarder le groupe'}</button>
      </div>
    </div>
  </div>);
}

function GroupeView({userEmail,roleLinge}){
  const [groups,setGroups]=useState([]);
  const [loading,setLoading]=useState(true);
  const [parsing,setParsing]=useState(false);
  const [draft,setDraft]=useState(null);
  const [viewing,setViewing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState('');
  const fileRef=useRef(null);

  async function loadGroups(){
    setLoading(true);
    const fb=getFirebase();
    if(!fb){setLoading(false);return;}
    try{
      const col=fb.collection(fb.db,'groupe');
      const snap=await fb.getDocs(col);
      const today=dateKey(new Date());
      const items=[];
      const toDelete=[];
      snap.forEach(d=>{
        const data=d.data();
        const norm={...data,id:d.id,sequences:(data.sequences||[]).map(s=>s.dishes||s||[])};
        if(data.date&&data.date<today)toDelete.push(d.id);
        else items.push(norm);
      });
      if(!roleLinge){
        for(const id of toDelete){
          try{await fb.deleteDoc(fb.doc(fb.db,'groupe',id));}catch(e){console.error(e);}
        }
      }
      items.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      setGroups(items);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  useEffect(()=>{loadGroups();},[]);

  async function handleFile(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    setError('');
    setParsing(true);
    try{
      const parsed=await parseGroupePdfFile(file);
      setDraft(parsed);
    }catch(err){
      console.error(err);
      setError("Impossible de lire ce PDF : "+(err&&err.message?err.message:'erreur inconnue')+". Vérifie que c'est bien un export texte (pas une image scannée).");
    }
    setParsing(false);
    if(fileRef.current)fileRef.current.value='';
  }

  async function saveDraft(){
    if(!draft)return;
    const fb=getFirebase();if(!fb)return;
    setSaving(true);
    setError('');
    const d=new Date(draft.dateGuess+'T12:00:00');
    const id=draft.dateGuess+'_'+slugifyCheese(draft.clientName||'groupe')+'_'+Date.now();
    try{
      await fb.setDoc(fb.doc(fb.db,'groupe',id),{
        date:draft.dateGuess,
        dateDisplay:fmtDateFR(d),
        clientName:draft.clientName,
        arrival:draft.arrival,
        pax:draft.pax,
        tables:draft.tables,
        observations:draft.observations.filter(Boolean),
        menuName:draft.menuName,
        menuPax:draft.menuPax,
        sequences:draft.sequences.map(seq=>({dishes:seq})),
        savedBy:userEmail,
        savedAt:new Date().toISOString(),
      });
      setDraft(null);
      await loadGroups();
    }catch(e){
      console.error(e);
      setError("Impossible d'enregistrer : "+(e&&e.message?e.message:'erreur inconnue'));
    }
    setSaving(false);
  }

  async function removeGroup(id){
    const fb=getFirebase();if(!fb)return;
    try{await fb.deleteDoc(fb.doc(fb.db,'groupe',id));setGroups(prev=>prev.filter(g=>g.id!==id));}catch(e){console.error(e);}
  }

  function groupByDate(items){
    const m={};items.forEach(it=>{const k=it.date||'';if(!m[k])m[k]=[];m[k].push(it);});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  }

  if(viewing){
    return(<div style={{position:'fixed',inset:0,background:'#f5f4f0',zIndex:260,overflowY:'auto',padding:12}}>
      <div style={{maxWidth:560,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
          <button onClick={()=>setViewing(null)} style={{background:'#1a1a1a',color:'#fff',border:'none',borderRadius:6,padding:'7px 14px',fontSize:12,cursor:'pointer'}}>Fermer</button>
        </div>
        <GroupeCard g={viewing}/>
      </div>
    </div>);
  }

  if(draft){
    return <GroupeEditForm draft={draft} setDraft={setDraft} onCancel={()=>setDraft(null)} onSave={saveDraft} saving={saving} error={error}/>;
  }

  return(<div style={{display:'flex',flexDirection:'column',gap:10}}>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',padding:'8px 12px',background:'#ececea',borderRadius:8,border:'0.5px solid #d4d2c8'}}>
      <span style={{fontSize:13,fontWeight:500}}>Groupes à venir</span>
      <div style={{flex:1}}/>
      {!roleLinge&&(<>
        <input ref={fileRef} type="file" accept="application/pdf" style={{display:'none'}} onChange={handleFile}/>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} disabled={parsing} style={{padding:'6px 12px',fontSize:12,fontWeight:600,border:'0.5px solid #378ADD',borderRadius:6,cursor:'pointer',background:'#eff6ff',color:'#1e40af',opacity:parsing?0.6:1}}>{parsing?'Lecture…':'+ Uploader un PDF'}</button>
      </>)}
    </div>
    {error&&<div style={{background:'#fef2f2',border:'0.5px solid #fecaca',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#991b1b'}}>{error}</div>}
    {loading&&<div style={{textAlign:'center',color:'#aaa',fontSize:13,padding:'30px 0'}}>Chargement…</div>}
    {!loading&&groups.length===0&&<div style={{textAlign:'center',color:'#aaa',fontSize:13,padding:'30px 0'}}>Aucun groupe à venir.</div>}
    {!loading&&groupByDate(groups).map(([d,items])=>{
      const label=d?new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
      return(<div key={d}>
        <div style={{fontSize:12,fontWeight:700,color:'#1a1a1a',textTransform:'capitalize',margin:'6px 2px'}}>{label}</div>
        {items.map(g=>(<div key={g.id} style={{background:'#fff',borderRadius:10,border:'0.5px solid #d4d2c8',padding:'10px 14px',marginBottom:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>{g.clientName}</div>
            <div style={{fontSize:11,color:'#888'}}>{(g.pax||'?')+' PAX · '+(g.arrival||'?')}</div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>setViewing(g)} style={{fontSize:11,padding:'4px 12px',border:'0.5px solid #86efac',borderRadius:6,cursor:'pointer',background:'#dcfce7',color:'#166534'}}>Voir</button>
            {!roleLinge&&<button onClick={()=>removeGroup(g.id)} style={{fontSize:16,padding:'2px 10px',border:'none',borderRadius:4,cursor:'pointer',background:'#fee2e2',color:'#991b1b',lineHeight:1}}>×</button>}
          </div>
        </div>))}
      </div>);
    })}
  </div>);
}

const SUPERADMIN_EMAIL='j.viale@sbm.mc';
function isSuperAdmin(email){return email===SUPERADMIN_EMAIL;}

function SettingsView({onClose,defaultSettings,setDefaultSettings,saveSettings,lingeItems,setLingeItems,saveLingeItems}){
  const [settings,setSettings]=useState(dc(defaultSettings));
  const [activeTab,setActiveTab]=useState('carcasse'); // 'carcasse' or 'linge'
  const [activeMode,setActiveMode]=useState('off');
  const [localLinge,setLocalLinge]=useState(dc(lingeItems));
  const [newItemLabel,setNewItemLabel]=useState('');
  const [newItemSection,setNewItemSection]=useState('blanchisseur');
  const [newItemNappe,setNewItemNappe]=useState('');

  const mode=activeMode==='off';
  const salleKey=mode?'defSalle':'terSalle';
  const terrKey=mode?'defTerrasse':'terTerrasse';

  async function handleSave(){
    if(activeTab==='carcasse'){
      setDefaultSettings(settings);
      await saveSettings(settings);
    } else {
      setLingeItems(localLinge);
      await saveLingeItems(localLinge);
    }
    onClose();
  }

  // Linge items management
  function moveItem(section,idx,dir){
    const newL=dc(localLinge);
    const arr=newL[section];
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=arr.length)return;
    [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
    setLocalLinge(newL);
  }
  function deleteItem(section,idx){
    const newL=dc(localLinge);
    newL[section].splice(idx,1);
    setLocalLinge(newL);
  }
  function addItem(){
    if(!newItemLabel.trim())return;
    const newL=dc(localLinge);
    const id='item_'+Date.now();
    const item={id,label:newItemLabel.trim()};
    if(newItemNappe)item.nappe=parseInt(newItemNappe);
    newL[newItemSection].push(item);
    setLocalLinge(newL);
    setNewItemLabel('');setNewItemNappe('');
  }

  const thStyle={fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.04em',padding:'4px 6px',textAlign:'center',borderBottom:'1px solid #e5e7eb'};
  const tdStyle={padding:'3px 4px',borderBottom:'0.5px solid #f0efe9',fontSize:12};

  function TableGrid({tables,zone}){
    const key=zone==='salle'?salleKey:terrKey;
    return(<table style={{width:'100%',borderCollapse:'collapse',marginBottom:10}}>
      <thead><tr>
        <th style={{...thStyle,textAlign:'left'}}>Table</th>
        <th style={thStyle}>Couverts</th>
        <th style={thStyle}>Plateau</th>
        <th style={thStyle}>OFF</th>
      </tr></thead>
      <tbody>{tables.map(tn=>{
        const d=settings[key][tn]||{covers:0,plateau:null,isConsole:false};
        const active=d.covers>0;
        return(<tr key={tn} style={{background:active?'#f0f9ff':'#fafaf9'}}>
          <td style={{...tdStyle,fontWeight:600,color:active?'#1e40af':'#aaa'}}>{tn}</td>
          <td style={tdStyle}><input type="text" inputMode="numeric" defaultValue={d.covers||''}
            onBlur={e=>{
              const c=parseInt(e.target.value)||0;
              const newS=dc(settings);
              if(!newS[key][tn])newS[key][tn]={covers:0,plateau:null,isConsole:false};
              newS[key][tn].covers=c;
              if(c===0){newS[key][tn].plateau=null;}
              else{newS[key][tn].plateau=suggestPlateau(tn,c,newS[key]);}
              setSettings(newS);
            }}
            style={{width:40,textAlign:'center',border:'0.5px solid #ccc',borderRadius:4,padding:'2px 4px',fontSize:12}}
          /></td>
          <td style={tdStyle}><select value={d.plateau||''} onChange={e=>{const newS=dc(settings);if(!newS[key][tn])newS[key][tn]={covers:0,plateau:null,isConsole:false};newS[key][tn].plateau=e.target.value?parseInt(e.target.value):null;setSettings(newS);}} disabled={!active} style={{fontSize:11,border:'0.5px solid #ccc',borderRadius:4,padding:'2px',background:active?'#fff':'#f5f4f0'}}>
            <option value="">-</option>
            {[100,120,140,180,200].map(pl=><option key={pl} value={pl}>{PL}{pl}</option>)}
          </select></td>
          <td style={{...tdStyle,textAlign:'center'}}><button onClick={()=>{const newS=dc(settings);newS[key][tn]={covers:0,plateau:null,isConsole:false};setSettings(newS);}} style={{fontSize:11,padding:'2px 8px',border:'0.5px solid #fca5a5',borderRadius:4,cursor:'pointer',background:'#fee2e2',color:'#991b1b'}}>×</button></td>
        </tr>);
      })}</tbody>
    </table>);
  }

  function LingeSection({section,label}){
    const items=localLinge[section]||[];
    return(<div style={{background:'#fff',borderRadius:8,padding:10,marginBottom:8,border:'0.5px solid #d4d2c8'}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color:'#888',marginBottom:8}}>{label}</div>
      {items.map((it,i)=>(<div key={it.id} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0',borderBottom:'0.5px solid #f0efe9'}}>
        <div style={{display:'flex',flexDirection:'column',gap:1}}>
          <button onClick={()=>moveItem(section,i,-1)} disabled={i===0} style={{fontSize:8,padding:'1px 3px',border:'0.5px solid #ddd',borderRadius:2,cursor:i===0?'default':'pointer',background:'#fff',color:i===0?'#ddd':'#888',lineHeight:1}}>▲</button>
          <button onClick={()=>moveItem(section,i,1)} disabled={i===items.length-1} style={{fontSize:8,padding:'1px 3px',border:'0.5px solid #ddd',borderRadius:2,cursor:i===items.length-1?'default':'pointer',background:'#fff',color:i===items.length-1?'#ddd':'#888',lineHeight:1}}>▼</button>
        </div>
        <span style={{flex:1,fontSize:12,color:'#1a1a1a'}}>{it.label}</span>
        {it.nappe&&<span style={{fontSize:10,color:'#888',background:'#f0efe9',padding:'1px 5px',borderRadius:3}}>Ø{it.nappe}</span>}
        <button onClick={()=>deleteItem(section,i)} style={{fontSize:14,padding:'1px 6px',border:'none',borderRadius:4,cursor:'pointer',background:'#fee2e2',color:'#991b1b'}}>×</button>
      </div>))}
    </div>);
  }

  return(<div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
    <div style={{background:'#f5f4f0',borderRadius:12,padding:20,width:'min(95vw,500px)',maxHeight:'85vh',overflowY:'auto',border:'0.5px solid #ddd'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontWeight:700,fontSize:15}}>Paramètres</span>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#888'}}>×</button>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {['carcasse','linge'].map(t=>(<button key={t} onClick={()=>setActiveTab(t)} style={{flex:1,padding:'8px',fontSize:12,fontWeight:600,border:'none',borderRadius:8,cursor:'pointer',background:activeTab===t?'#1a1a1a':'#ececea',color:activeTab===t?'#fff':'#555'}}>
          {t==='carcasse'?'Carcasse':'Linge'}
        </button>))}
      </div>

      {activeTab==='carcasse'&&(<>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {['off','on'].map(m=>(<button key={m} onClick={()=>setActiveMode(m)} style={{flex:1,padding:'8px',fontSize:12,fontWeight:600,border:'none',borderRadius:8,cursor:'pointer',background:activeMode===m?'#378ADD':'#ececea',color:activeMode===m?'#fff':'#555'}}>
            {m==='off'?'Terrasse OFF':'Terrasse ON'}
          </button>))}
        </div>
        <div style={{background:'#fff',borderRadius:8,padding:10,marginBottom:8,border:'0.5px solid #d4d2c8'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color:'#888',marginBottom:8}}>Salle</div>
          <TableGrid tables={SALLE} zone="salle"/>
        </div>
        <div style={{background:'#fff',borderRadius:8,padding:10,marginBottom:14,border:'0.5px solid #d4d2c8'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color:'#888',marginBottom:8}}>Terrasse</div>
          <TableGrid tables={TERRASSE} zone="terrasse"/>
        </div>
      </>)}

      {activeTab==='linge'&&(<>
        <LingeSection section="blanchisseur" label="Blanchisseur"/>
        <LingeSection section="elis" label="Elis"/>
        <div style={{background:'#fff',borderRadius:8,padding:12,marginBottom:14,border:'0.5px solid #d4d2c8'}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em',color:'#888',marginBottom:8}}>Ajouter un article</div>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            {['blanchisseur','elis'].map(s=>(<button key={s} onClick={()=>setNewItemSection(s)} style={{flex:1,padding:'6px',fontSize:11,fontWeight:600,border:'none',borderRadius:6,cursor:'pointer',background:newItemSection===s?'#1a1a1a':'#ececea',color:newItemSection===s?'#fff':'#555'}}>{s==='blanchisseur'?'Blanchisseur':'Elis'}</button>))}
          </div>
          <input value={newItemLabel} onChange={e=>setNewItemLabel(e.target.value)} placeholder="Nom de l'article" style={{width:'100%',padding:'7px 10px',fontSize:12,border:'0.5px solid #ccc',borderRadius:6,marginBottom:6,boxSizing:'border-box',outline:'none'}}/>
          <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:11,color:'#888'}}>Nappe (optionnel) :</span>
            <select value={newItemNappe} onChange={e=>setNewItemNappe(e.target.value)} style={{fontSize:12,border:'0.5px solid #ccc',borderRadius:6,padding:'4px 6px'}}>
              <option value="">Aucune</option>
              {[180,200,220,260,280].map(n=><option key={n} value={n}>Ø{n}</option>)}
            </select>
          </div>
          <button onClick={addItem} disabled={!newItemLabel.trim()} style={{width:'100%',padding:'8px',fontSize:12,fontWeight:600,border:'0.5px solid #378ADD',borderRadius:6,cursor:'pointer',background:'#dbeafe',color:'#1e40af',opacity:newItemLabel.trim()?1:0.5}}>+ Ajouter</button>
        </div>
      </>)}

      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={onClose} style={{padding:'8px 16px',fontSize:13,border:'0.5px solid #ccc',borderRadius:8,cursor:'pointer',background:'#fff',color:'#555'}}>Annuler</button>
        <button onClick={handleSave} style={{padding:'8px 20px',fontSize:13,fontWeight:600,border:'none',borderRadius:8,cursor:'pointer',background:'#1a1a1a',color:'#fff'}}>Sauvegarder</button>
      </div>
    </div>
  </div>);
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [authState,setAuthState]=useState('checking');
  const [userEmail,setUserEmail]=useState('');
  const [tab,setTab]=useState('carcasse');
  const [services,setServices]=useState(DEFAULT_SERVICES);
  const [tables,setTables]=useState(()=>buildDefault(DEFAULT_SERVICES));
  const [terrasseMode,setTerrasseMode]=useState(()=>Object.fromEntries(DEFAULT_SERVICES.map(s=>[s.id,false])));
  const [manual,setManual]=useState(()=>Object.fromEntries(DEFAULT_SERVICES.map(s=>[s.id,{}])));
  const [currentService,setCurrentService]=useState('mar-d');
  const [compos,setCompos]=useState(()=>Object.fromEntries(DEFAULT_SERVICES.map(s=>[s.id,buildEmptyCompo()])));
  const [team,setTeam]=useState(INITIAL_TEAM);
  const [modal,setModal]=useState(null);
  const [showSvc,setShowSvc]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [showCopyCarcasse,setShowCopyCarcasse]=useState(false);
  const [syncStatus,setSyncStatus]=useState('idle');
  const [salleAllOff,setSalleAllOff]=useState(false);
  const [terrasseAllOff,setTerrasseAllOff]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [defaultSettings,setDefaultSettings]=useState({
    defSalle:dc(DEF_SALLE),defTerrasse:dc(DEF_TERRASSE),
    terSalle:dc(TER_SALLE),terTerrasse:dc(TER_TERRASSE)
  });
  const [lingeItems,setLingeItems]=useState({
    blanchisseur:dc(BLANCHISSEUR_ITEMS),
    elis:dc(ELIS_ITEMS)
  });
  const [fromageList,setFromageList]=useState(dc(DEFAULT_FROMAGE_LIST));
  const saveTimerRef=useRef(null);
  const unsubscribeRef=useRef(null);
  const roleLinge=isLinge(userEmail);

  // Auth listener
  useEffect(()=>{
    const fb=getFirebase();
    if(!fb){setAuthState('logged-out');return;}
    const unsub=fb.onAuthStateChanged(fb.auth,user=>{
      if(user){setAuthState('logged-in');setUserEmail(user.email||'');}
      else{setAuthState('logged-out');}
    });
    return()=>unsub();
  },[]);

  // Firestore real-time listener (when logged in)
  useEffect(()=>{
    if(authState!=='logged-in')return;
    const fb=getFirebase();
    if(!fb)return;
    const ref=fb.doc(fb.db,'app','state');
    const unsub=fb.onSnapshot(ref,snap=>{
      if(!snap.exists())return;
      const p=snap.data();
      if(p.services?.length>0)setServices(p.services);
      if(p.tables)setTables(p.tables);
      if(p.terrasseMode)setTerrasseMode(p.terrasseMode);
      if(p.manual)setManual(p.manual);
      if(p.currentService)setCurrentService(p.currentService);
      if(p.compos)setCompos(p.compos);
      if(p.team){
        const merged=p.team.map(saved=>{const ini=INITIAL_TEAM.find(m=>m.id===saved.id);return{...saved,gender:saved.gender||(ini?.gender??'m')};});
        setTeam(merged);
      }
      if(p.defaultSettings)setDefaultSettings(p.defaultSettings);
      if(p.lingeItems)setLingeItems(p.lingeItems);
      if(p.fromageList)setFromageList(p.fromageList);
    },(err)=>{console.error('Firestore error',err);setSyncStatus('error');});
    unsubscribeRef.current=unsub;
    return()=>{if(unsubscribeRef.current)unsubscribeRef.current();};
  },[authState]);

  const save=useCallback((svcList,tbl,ter,man,curSvc,cps,tm)=>{
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({services:svcList,tables:tbl,terrasseMode:ter,manual:man,currentService:curSvc,compos:cps,team:tm}));}catch(e){}
    const fb=getFirebase();
    if(!fb||authState!=='logged-in')return;
    setSyncStatus('saving');
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(async()=>{
      try{
        const ref=fb.doc(fb.db,'app','state');
        // Écriture ciblée : uniquement le service en cours (tables/terrasse/manuel/compo),
        // pour qu'une modification sur un autre service (ou un autre appareil resté ouvert)
        // n'écrase jamais toute la semaine. services/currentService/team restent en écriture globale
        // (changent rarement en simultané).
        const patch={
          services:svcList,
          currentService:curSvc,
          team:tm,
          ['tables.'+curSvc]: tbl[curSvc],
          ['terrasseMode.'+curSvc]: ter[curSvc]!==undefined?ter[curSvc]:null,
          ['manual.'+curSvc]: man[curSvc]||null,
          ['compos.'+curSvc]: cps[curSvc]||null,
        };
        try{
          await fb.updateDoc(ref,patch);
        }catch(inner){
          // Le document n'existe peut-être pas encore (tout premier lancement) : repli sur un set complet.
          await fb.setDoc(ref,{services:svcList,tables:tbl,terrasseMode:ter,manual:man,currentService:curSvc,compos:cps,team:tm},{merge:true});
        }
        setSyncStatus('saved');
        setTimeout(()=>setSyncStatus('idle'),2000);
      }catch(e){console.error('Save error',e);setSyncStatus('error');}
    },800);
  },[authState]);

  async function handleLogout(){
    const fb=getFirebase();
    if(!fb)return;
    await fb.signOut(fb.auth);
  }

  if(authState==='checking'){
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#f5f4f0',fontFamily:'system-ui,sans-serif',color:'#888',fontSize:14}}>Chargement…</div>;
  }
  if(authState==='logged-out'){
    return <LoginScreen/>;
  }

  const svcData=tables[currentService]||{};const currentSvcObj=services.find(s=>s.id===currentService);const man=manual[currentService]||{};
  let ts=0,tt=0,cs=0,ct=0;SALLE.forEach(tn=>{const d=svcData[tn];if(d&&d.covers>0&&!d.isConsole){ts+=d.covers;cs+=getCavallino(tn,d.covers);}});TERRASSE.forEach(tn=>{const d=svcData[tn];if(d&&d.covers>0&&!d.isConsole){tt+=d.covers;ct+=getCavallino(tn,d.covers);}});

  async function saveSettings(s){
    const fb=getFirebase();if(!fb)return;
    try{const ref=fb.doc(fb.db,'app','state');await fb.setDoc(ref,{defaultSettings:s},{merge:true});}
    catch(e){console.error(e);}
  }

  async function saveLingeItems(items){
    const fb=getFirebase();if(!fb)return;
    try{const ref=fb.doc(fb.db,'app','state');await fb.setDoc(ref,{lingeItems:items},{merge:true});}
    catch(e){console.error(e);}
  }

  async function saveFromageList(list){
    const fb=getFirebase();if(!fb)return;
    try{const ref=fb.doc(fb.db,'app','state');await fb.setDoc(ref,{fromageList:list},{merge:true});}
    catch(e){console.error(e);}
  }

  function toggleTerrasse(){
    const svc=currentService,mode=!terrasseMode[svc],newTer={...terrasseMode,[svc]:mode};
    const salleTarget=mode?defaultSettings.terSalle:defaultSettings.defSalle;
    const terrTarget=mode?defaultSettings.terTerrasse:defaultSettings.defTerrasse;
    const newT=dc(tables);
    SALLE.forEach(tn=>{newT[svc][tn]=dc(salleTarget[tn]||mkoff());});
    TERRASSE.forEach(tn=>{newT[svc][tn]=dc(terrTarget[tn]||mkoff());});
    setTables(newT);setTerrasseMode(newTer);save(services,newT,newTer,manual,currentService,compos,team);
  }

  function toggleSalleAll(){
    const newT=dc(tables);
    if(!salleAllOff){SALLE.forEach(tn=>{newT[currentService][tn]=mkoff();});}
    else{SALLE.forEach(tn=>{newT[currentService][tn]=dc(DEF_SALLE[tn]);});}
    setSalleAllOff(!salleAllOff);setTables(newT);save(services,newT,terrasseMode,manual,currentService,compos,team);
  }
  function toggleTerrasseAll(){
    const newT=dc(tables);
    if(!terrasseAllOff){TERRASSE.forEach(tn=>{newT[currentService][tn]=mkoff();});}
    else{TERRASSE.forEach(tn=>{newT[currentService][tn]=dc(DEF_TERRASSE[tn]);});}
    setTerrasseAllOff(!terrasseAllOff);setTables(newT);save(services,newT,terrasseMode,manual,currentService,compos,team);
  }

  function insertService(id,label,afterId){if(services.find(s=>s.id===id))return;const targetPos=ORDER.indexOf(id);let insertAt=services.findIndex(s=>s.nextWeek);if(insertAt<0)insertAt=services.length;for(let i=0;i<services.length;i++){if(ORDER.indexOf(services[i].id)>targetPos&&!services[i].nextWeek){insertAt=i;break;}}const newSvc=[...services];newSvc.splice(insertAt,0,{id,label,extra:true});const newT={...tables,[id]:dc(tables[afterId]||buildDefault([{id}])[id])};const newTer={...terrasseMode,[id]:terrasseMode[afterId]||false};const newMan={...manual,[id]:{}};const newCps={...compos,[id]:buildEmptyCompo()};setServices(newSvc);setTables(newT);setTerrasseMode(newTer);setManual(newMan);setCompos(newCps);setCurrentService(id);setShowSvc(false);save(newSvc,newT,newTer,newMan,id,newCps,team);}

  function removeService(id){const idx=services.findIndex(s=>s.id===id);if(idx<0)return;const newSvc=services.filter(s=>s.id!==id);const newT={...tables};delete newT[id];const newTer={...terrasseMode};delete newTer[id];const newMan={...manual};delete newMan[id];const newCps={...compos};delete newCps[id];const newCur=newSvc[Math.max(0,idx-1)]?.id??newSvc[0]?.id??'mar-d';setServices(newSvc);setTables(newT);setTerrasseMode(newTer);setManual(newMan);setCompos(newCps);setCurrentService(newCur);setShowSvc(false);save(newSvc,newT,newTer,newMan,newCur,newCps,team);}

      <div style={{fontSize:15,fontWeight:600,marginBottom:12}}>Initialiser la carcasse</div>
      <div style={{fontSize:11,fontWeight:600,color:'#555',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>Copier depuis</div>
      {services.filter(s=>s.id!==currentService).map(s=>{const sd=tables[s.id];return(<button key={s.id} onClick={()=>{const newT=dc(tables);newT[currentService]={};[...SALLE,...TERRASSE].forEach(tn=>{newT[currentService][tn]=dc((sd&&sd[tn])||mkoff());});setTables(newT);save(services,newT,terrasseMode,manual,currentService,compos,team);setShowCopyCarcasse(false);}} style={{display:'block',width:'100%',marginBottom:6,padding:'9px 12px',border:'0.5px solid #378ADD',borderRadius:8,cursor:'pointer',background:'#dbeafe',color:'#1e40af',fontSize:13,fontWeight:500,textAlign:'left'}}>{s.label}</button>);})}
      <button onClick={()=>{const newT=dc(tables);newT[currentService]={};[...SALLE,...TERRASSE].forEach(tn=>{newT[currentService][tn]=mkoff();});setTables(newT);save(services,newT,terrasseMode,manual,currentService,compos,team);setShowCopyCarcasse(false);}} style={{display:'block',width:'100%',marginTop:8,padding:'10px',border:'0.5px solid #ccc',borderRadius:8,cursor:'pointer',background:'#fff',color:'#555',fontSize:13}}>Remettre à zéro</button>
      <button onClick={()=>setShowCopyCarcasse(false)} style={{display:'block',width:'100%',marginTop:6,padding:'8px',border:'none',background:'none',cursor:'pointer',color:'#aaa',fontSize:12}}>Annuler</button>
    </div></div>)}
    {showSettings&&<SettingsView onClose={()=>setShowSettings(false)} defaultSettings={defaultSettings} setDefaultSettings={setDefaultSettings} saveSettings={saveSettings} lingeItems={lingeItems} setLingeItems={setLingeItems} saveLingeItems={saveLingeItems}/>}
    {showExport&&<CarcasseExport onClose={()=>setShowExport(false)} services={services} tables={tables} currentService={currentService} manual={manual}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
